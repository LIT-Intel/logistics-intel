name: Campaign Schedule Hotfix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/campaign-schedule-hotfix.yml
      - .github/campaign-schedule-hotfix-trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch launch save behavior
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'frontend/src/pages/CampaignBuilder.jsx';
          let text = fs.readFileSync(path, 'utf8');
          const before = text;
          text = text.replace(
            '      const res = await launchCampaign(editId, validManual);',
            '      const saved = await handleSave();\n      if (!saved) {\n        setError("Launch paused — save the selected schedule and campaign changes, then try again.");\n        return;\n      }\n      const res = await launchCampaign(editId, validManual);'
          );
          text = text.replace(
            '  }, [canLaunch, editId, manualEmails, navigate]);',
            '  }, [canLaunch, editId, handleSave, manualEmails, navigate]);'
          );
          if (text === before && !text.includes('const saved = await handleSave();')) {
            throw new Error('CampaignBuilder patch target not found');
          }
          fs.writeFileSync(path, text);
          try { fs.unlinkSync('.github/campaign-schedule-hotfix-trigger'); } catch {}
          try { fs.unlinkSync('.github/workflows/campaign-schedule-hotfix.yml'); } catch {}
          NODE
      - name: Commit patch and cleanup
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/pages/CampaignBuilder.jsx .github/workflows/campaign-schedule-hotfix.yml .github/campaign-schedule-hotfix-trigger
          git commit -m "Fix campaign launch schedule persistence"
          git push
