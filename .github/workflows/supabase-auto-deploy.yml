name: Supabase auto-deploy (edge fns + migrations)

# Permanent fix for the operator-deploy gap: this workflow lands every
# supabase/* change to production automatically on push to main. Pair with
# the existing edge-fn-drift-check.yml PR gate to catch drift BEFORE merge,
# and this workflow handles deploy AFTER merge.
#
# One-time setup: add SUPABASE_ACCESS_TOKEN as a repo secret (Settings →
# Secrets and variables → Actions). Generate at supabase.com → Account →
# Access Tokens.
#
# verify_jwt per fn is read from supabase/functions/.verify-jwt-manifest.json
# — slugs in `no_verify_jwt` are deployed with --no-verify-jwt; everything
# else defaults to JWT-protected.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Redeploy ALL edge fns regardless of diff (slow, ~5 min). Use after fixing the manifest or a bulk-change.'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: jkmrfiaefxwgbvftohrb
      # Opt into Node.js 24 runtime for JS actions ahead of GitHub's Jun 16, 2026
      # forced-default. Silences the "Node 20 deprecated" warning permanently.
      # Once Node 24 is the default everywhere, this line becomes a no-op and
      # can be removed.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # last commit + parent so we can diff

      - name: Verify secret is set
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error ::SUPABASE_ACCESS_TOKEN secret is not configured on this repo."
            echo "Add it under Settings → Secrets and variables → Actions."
            echo "Generate one at supabase.com → Account → Access Tokens."
            exit 1
          fi

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Identify changed edge functions
        id: changed-fns
        run: |
          set -euo pipefail
          force_all='${{ github.event.inputs.force_all }}'
          # Always read the excluded list from the manifest so the same slugs
          # are skipped whether we're doing force_all or diff-based deploy.
          manifest='supabase/functions/.verify-jwt-manifest.json'
          if [ -f "$manifest" ]; then
            excluded=$(python3 -c "import json; m=json.load(open('$manifest')); print('|'.join(m.get('excluded',[])))")
          else
            excluded=''
          fi
          # Pattern matches whole-line slug equality.
          exclude_pat="^(${excluded:-IMPOSSIBLE_NEVER_MATCH})$"

          if [ "$force_all" = "true" ]; then
            echo "force_all=true — deploying ALL edge fns (minus excluded list)"
            slugs=$(ls -1 supabase/functions/ \
              | grep -v '^_shared' \
              | grep -v '\.json$' \
              | grep -Ev "$exclude_pat" \
              | sort -u)
          else
            # Diff against the previous commit on main.
            slugs=$(git diff --name-only HEAD^..HEAD \
              | grep '^supabase/functions/' \
              | sed 's|supabase/functions/||' \
              | awk -F/ '{ print $1 }' \
              | sort -u \
              | grep -v '^_shared' \
              | grep -v '\.json$' \
              | grep -Ev "$exclude_pat" \
              || true)
          fi
          if [ -z "$slugs" ]; then
            echo "No edge function changes — skipping fn deploy."
            echo "slugs=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Slugs to deploy:"
          echo "$slugs"
          {
            echo 'slugs<<EOF'
            echo "$slugs"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Deploy changed edge functions
        if: steps.changed-fns.outputs.slugs != ''
        run: |
          set -uo pipefail
          manifest='supabase/functions/.verify-jwt-manifest.json'
          if [ ! -f "$manifest" ]; then
            echo "::warning ::verify-jwt-manifest.json missing — defaulting all to JWT-protected. New webhooks will break."
            no_verify_list=''
          else
            no_verify_list=$(python3 -c "import json,sys; m=json.load(open('$manifest')); print('\n'.join(m.get('no_verify_jwt',[])))")
          fi

          fail=0
          while IFS= read -r slug; do
            [ -z "$slug" ] && continue
            if [ ! -d "supabase/functions/$slug" ]; then
              echo "::warning ::Slug $slug has no source dir — skipping (probably a delete)."
              continue
            fi
            if [ ! -f "supabase/functions/$slug/index.ts" ]; then
              echo "::warning ::Slug $slug has no index.ts — skipping."
              continue
            fi

            if echo "$no_verify_list" | grep -qx "$slug"; then
              flag='--no-verify-jwt'
              auth_note='verify_jwt=false (per manifest)'
            else
              flag=''
              auth_note='verify_jwt=true (default)'
            fi

            echo "::group::Deploy $slug — $auth_note"
            if ! supabase functions deploy "$slug" \
                --project-ref "$PROJECT_REF" $flag; then
              echo "::error ::Failed to deploy $slug"
              fail=1
            else
              echo "✓ Deployed $slug"
            fi
            echo "::endgroup::"
          done <<< "${{ steps.changed-fns.outputs.slugs }}"

          if [ "$fail" = "1" ]; then
            echo "::error ::One or more edge function deploys failed — see logs above."
            exit 1
          fi

      - name: Identify migration changes
        id: changed-migs
        run: |
          set -euo pipefail
          mig_files=$(git diff --name-only HEAD^..HEAD \
            | grep '^supabase/migrations/.*\.sql$' \
            || true)
          if [ -z "$mig_files" ]; then
            echo "No migration changes — skipping db push."
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
          else
            echo "Migrations changed:"
            echo "$mig_files"
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply migrations
        if: steps.changed-migs.outputs.has_migrations == 'true'
        run: |
          set -euo pipefail
          # supabase db push is idempotent — already-applied migrations are skipped.
          supabase db push --project-ref "$PROJECT_REF" --include-all

      - name: Summary
        if: always()
        run: |
          echo "## Supabase deploy summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Project ref:** \`${PROJECT_REF}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger:** \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -n '${{ steps.changed-fns.outputs.slugs }}' ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Edge fns deployed" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo '${{ steps.changed-fns.outputs.slugs }}' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ '${{ steps.changed-migs.outputs.has_migrations }}' = 'true' ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Migrations applied" >> "$GITHUB_STEP_SUMMARY"
            echo "Ran \`supabase db push\` — idempotent." >> "$GITHUB_STEP_SUMMARY"
          fi
