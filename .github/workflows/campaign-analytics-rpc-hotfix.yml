name: Campaign analytics RPC hotfix

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/campaign-analytics-rpc-hotfix.yml
      - .github/codex-trigger/campaign-analytics-rpc.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Patch analytics page to use org RPC
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'frontend/src/pages/CampaignAnalyticsPage.jsx';
          let src = fs.readFileSync(file, 'utf8');
          const oldBlock = `        const startIso = rangeStartIso(rangeId);
        let evtQuery = supabase
          .from("lit_outreach_history")
          .select("id,campaign_id,campaign_step_id,event_type,status,occurred_at,subject,metadata,error_message")
          .in("event_type", ["sent", "opened", "clicked", "replied", "bounced", "send_failed", "suppressed", "meeting_booked"]);
        if (orgUserIds.length) evtQuery = evtQuery.in("user_id", orgUserIds);
        if (startIso) evtQuery = evtQuery.gte("occurred_at", startIso);
        const eventsPromise = orgUserIds.length ? evtQuery.order("occurred_at", { ascending: false }).limit(5000) : Promise.resolve({ data: [], error: null });
`;
          const newBlock = `        const startIso = rangeStartIso(rangeId);
        const eventsPromise = orgUserIds.length
          ? supabase.rpc("lit_org_outreach_events", {
              p_org_id: orgId,
              p_start_at: startIso,
              p_limit: 5000,
            })
          : Promise.resolve({ data: [], error: null });
`;
          if (!src.includes(oldBlock)) {
            throw new Error('Expected outreach-history query block not found.');
          }
          src = src.replace(oldBlock, newBlock);
          fs.writeFileSync(file, src);
          NODE
      - name: Commit patch and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/pages/CampaignAnalyticsPage.jsx
          git rm -f .github/workflows/campaign-analytics-rpc-hotfix.yml .github/codex-trigger/campaign-analytics-rpc.txt || true
          git commit -m "Use org analytics RPC for campaign page" || exit 0
          git push
