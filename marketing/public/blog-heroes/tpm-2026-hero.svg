<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="TPM 2026 contract season — Gemini one year in, IEEPA pending, WCI stable">
  <defs>
    <linearGradient id="t-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="t-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFCFE"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <radialGradient id="t-glow" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="t-curve" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00F0FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="t-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#t-bg)"/>
  <circle cx="900" cy="360" r="420" fill="url(#t-glow)"/>

  <!-- Top-left brand badge -->
  <g transform="translate(40,32)">
    <rect width="148" height="28" rx="14" fill="rgba(0,240,255,0.14)" stroke="#00F0FF" stroke-width="1"/>
    <circle cx="20" cy="14" r="4" fill="#00F0FF"/>
    <text x="36" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#E0F2FE" letter-spacing="0.16em">LIT TRADE LANE BRIEF</text>
  </g>

  <!-- Left: title block -->
  <g transform="translate(40,160)">
    <text font-family="Inter, system-ui, sans-serif" font-size="50" font-weight="800" fill="#F8FAFC" letter-spacing="-0.022em">
      <tspan x="0" dy="0">Trans-Pacific</tspan>
      <tspan x="0" dy="58">Contract Season</tspan>
      <tspan x="0" dy="58" fill="#00F0FF">2026</tspan>
    </text>
    <text x="0" y="240" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#94A3B8" letter-spacing="-0.005em">
      <tspan x="0" dy="0">Annual rates set May 1.</tspan>
      <tspan x="0" dy="28">Gemini one year in.</tspan>
      <tspan x="0" dy="28">IEEPA decision pending.</tspan>
    </text>
    <g transform="translate(0,344)">
      <rect width="220" height="32" rx="16" fill="rgba(0,240,255,0.10)" stroke="#00F0FF" stroke-width="1"/>
      <text x="110" y="20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#E0F2FE" letter-spacing="0.14em">~$50B IN CAPACITY · LIVE</text>
    </g>
  </g>

  <!-- Right: Drewry-style WCI rate panel -->
  <g transform="translate(610,90)" filter="url(#t-shadow)">
    <rect width="550" height="540" rx="14" fill="url(#t-card)"/>
    <!-- Header -->
    <g transform="translate(20,20)">
      <text font-family="ui-monospace, SF Mono, monospace" font-size="10" font-weight="800" fill="#64748B" letter-spacing="0.16em">DREWRY WCI — TRANS-PACIFIC ($/FEU)</text>
      <text x="0" y="30" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#0F172A">Q1 2026 — stable, not scarce</text>
      <text x="0" y="54" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#64748B">Spot rates tighter than Q1 2024 → contract leverage on reliability, not price</text>
    </g>
    <!-- Chart area -->
    <g transform="translate(40,140)">
      <!-- Y axis labels -->
      <g font-family="ui-monospace, SF Mono, monospace" font-size="9.5" fill="#94A3B8">
        <text x="-6" y="4" text-anchor="end">$3,500</text>
        <text x="-6" y="70" text-anchor="end">$3,000</text>
        <text x="-6" y="136" text-anchor="end">$2,500</text>
        <text x="-6" y="202" text-anchor="end">$2,000</text>
        <text x="-6" y="268" text-anchor="end">$1,500</text>
      </g>
      <!-- Grid -->
      <g stroke="#E2E8F0" stroke-width="1">
        <line x1="0" y1="0" x2="480" y2="0"/>
        <line x1="0" y1="66" x2="480" y2="66"/>
        <line x1="0" y1="132" x2="480" y2="132"/>
        <line x1="0" y1="198" x2="480" y2="198"/>
        <line x1="0" y1="264" x2="480" y2="264"/>
      </g>
      <!-- Q1 2024 curve (red, more volatile) -->
      <path d="M0 30 Q40 80 80 50 T160 90 Q200 60 240 100 T320 140 Q360 110 400 130 T480 110"
            fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <!-- Q1 2026 curve (cyan, tighter band) -->
      <path d="M0 175 Q40 165 80 170 T160 175 Q200 168 240 178 T320 175 Q360 170 400 180 T480 178"
            fill="none" stroke="url(#t-curve)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- X axis labels -->
      <g font-family="ui-monospace, SF Mono, monospace" font-size="9.5" fill="#94A3B8">
        <text x="0" y="282" text-anchor="middle">JAN</text>
        <text x="96" y="282" text-anchor="middle">FEB</text>
        <text x="192" y="282" text-anchor="middle">MAR</text>
        <text x="288" y="282" text-anchor="middle">APR</text>
        <text x="384" y="282" text-anchor="middle">MAY</text>
        <text x="480" y="282" text-anchor="middle">JUN</text>
      </g>
    </g>
    <!-- Legend -->
    <g transform="translate(40,440)">
      <rect width="6" height="6" fill="#EF4444" rx="1"/>
      <text x="14" y="6" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#475569">Q1 2024 spot</text>
      <rect x="140" y="0" width="6" height="6" fill="#0EA5E9" rx="1"/>
      <text x="154" y="6" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#475569">Q1 2026 spot (current)</text>
    </g>
    <!-- Carrier alliance pills -->
    <g transform="translate(20,478)" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">
      <text x="0" y="0" fill="#64748B" letter-spacing="0.1em">2026 ALLIANCES</text>
      <g transform="translate(0,12)">
        <rect width="92" height="22" rx="11" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
        <text x="46" y="15" text-anchor="middle" fill="#1D4ED8">GEMINI · YR 1</text>
      </g>
      <g transform="translate(100,12)">
        <rect width="92" height="22" rx="11" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
        <text x="46" y="15" text-anchor="middle" fill="#B45309">PREMIER ALL.</text>
      </g>
      <g transform="translate(200,12)">
        <rect width="92" height="22" rx="11" fill="#E0E7FF" stroke="#6366F1" stroke-width="1"/>
        <text x="46" y="15" text-anchor="middle" fill="#4338CA">OCEAN ALL.</text>
      </g>
      <g transform="translate(300,12)">
        <rect width="92" height="22" rx="11" fill="#FCE7F3" stroke="#EC4899" stroke-width="1"/>
        <text x="46" y="15" text-anchor="middle" fill="#BE185D">MSC SOLO</text>
      </g>
    </g>
  </g>
</svg>
