<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Five-step lane-launch playbook for freight forwarders — lane selection, live shipper cohort, buyer-side contact resolution, signal-seeded sequence, measure-iterate-expand loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- eyebrow -->
  <text x="60" y="80" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="14" letter-spacing="2" font-weight="500">LIT · FORWARDER PLAYBOOK · 2026</text>

  <!-- headline -->
  <text x="60" y="138" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="600">Launch a new lane in 90 days.</text>
  <text x="60" y="180" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400">Five steps. Repeatable across 47 industries.</text>

  <!-- step connector line -->
  <line x1="100" y1="316" x2="1130" y2="316" stroke="#1e293b" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- step 1: lane selection -->
  <g transform="translate(60, 240)">
    <circle cx="20" cy="76" r="20" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
    <text x="20" y="82" fill="#94a3b8" font-family="Inter" font-size="14" font-weight="700" text-anchor="middle">1</text>
    <rect x="0" y="116" width="208" height="208" rx="14" fill="#ffffff" opacity="0.06" stroke="#1e293b" stroke-width="1"/>
    <text x="14" y="146" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="1.5" font-weight="500">STEP 1 · LANE</text>
    <text x="14" y="176" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Pick the gap</text>
    <text x="14" y="208" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Capacity vs. demand</text>
    <text x="14" y="226" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">on the route you own.</text>
    <text x="14" y="266" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">VN → USWC</text>
    <text x="14" y="290" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="1" font-weight="500">EXAMPLE LANE</text>
  </g>

  <!-- step 2: live cohort -->
  <g transform="translate(282, 240)">
    <circle cx="20" cy="76" r="20" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="20" y="82" fill="#fbbf24" font-family="Inter" font-size="14" font-weight="700" text-anchor="middle">2</text>
    <rect x="0" y="116" width="208" height="208" rx="14" fill="#ffffff" opacity="0.06" stroke="#1e293b" stroke-width="1"/>
    <text x="14" y="146" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="1.5" font-weight="500">STEP 2 · COHORT</text>
    <text x="14" y="176" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Live shippers</text>
    <text x="14" y="208" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Filter the BOL graph</text>
    <text x="14" y="226" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">to active on this lane.</text>
    <text x="14" y="266" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">218</text>
    <text x="14" y="290" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="1" font-weight="500">SHIPPERS · LAST 90D</text>
  </g>

  <!-- step 3: contacts -->
  <g transform="translate(504, 240)">
    <circle cx="20" cy="76" r="20" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <text x="20" y="82" fill="#60a5fa" font-family="Inter" font-size="14" font-weight="700" text-anchor="middle">3</text>
    <rect x="0" y="116" width="208" height="208" rx="14" fill="#ffffff" opacity="0.06" stroke="#1e293b" stroke-width="1"/>
    <text x="14" y="146" fill="#60a5fa" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="1.5" font-weight="500">STEP 3 · CONTACT</text>
    <text x="14" y="176" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Resolve buyers</text>
    <text x="14" y="208" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Procurement, logistics,</text>
    <text x="14" y="226" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">supply chain — verified.</text>
    <text x="14" y="266" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">~3 / shipper</text>
    <text x="14" y="290" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="1" font-weight="500">REVALIDATED 30D</text>
  </g>

  <!-- step 4: sequence -->
  <g transform="translate(726, 240)">
    <circle cx="20" cy="76" r="20" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <text x="20" y="82" fill="#34d399" font-family="Inter" font-size="14" font-weight="700" text-anchor="middle">4</text>
    <rect x="0" y="116" width="208" height="208" rx="14" fill="#ffffff" opacity="0.06" stroke="#1e293b" stroke-width="1"/>
    <text x="14" y="146" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="1.5" font-weight="500">STEP 4 · SEQUENCE</text>
    <text x="14" y="176" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Signal-seeded</text>
    <text x="14" y="208" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Email + LinkedIn drafted</text>
    <text x="14" y="226" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">on the shipper's lane.</text>
    <text x="14" y="266" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">6 touches</text>
    <text x="14" y="290" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="1" font-weight="500">15 DAY CADENCE</text>
  </g>

  <!-- step 5: loop -->
  <g transform="translate(948, 240)">
    <circle cx="20" cy="76" r="20" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="20" y="82" fill="#a78bfa" font-family="Inter" font-size="14" font-weight="700" text-anchor="middle">5</text>
    <rect x="0" y="116" width="208" height="208" rx="14" fill="#ffffff" opacity="0.06" stroke="#1e293b" stroke-width="1"/>
    <text x="14" y="146" fill="#a78bfa" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="1.5" font-weight="500">STEP 5 · LOOP</text>
    <text x="14" y="176" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Measure → expand</text>
    <text x="14" y="208" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Bookings per industry</text>
    <text x="14" y="226" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">→ next lane / cohort.</text>
    <text x="14" y="266" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">47 industries</text>
    <text x="14" y="290" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="1" font-weight="500">90 DAYS · CASE STUDY</text>
  </g>

  <!-- footer brand -->
  <text x="60" y="600" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">logisticintel.com</text>
  <text x="1140" y="600" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="end">Forwarder lane launch · 2026</text>
</svg>
