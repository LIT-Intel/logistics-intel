<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="Agentic AI in supply chain — the 2026 shift from visibility to execution across truckload, ocean, and air freight markets">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0.85" cy="0.25" r="0.55">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="brandGlow" cx="0.15" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stageFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(15,23,42,0.92)"/>
      <stop offset="100%" stop-color="rgba(11,18,32,0.92)"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1020" cy="180" r="420" fill="url(#cyanGlow)"/>
  <circle cx="180" cy="612" r="320" fill="url(#brandGlow)"/>

  <!-- Top-left brand badge -->
  <g transform="translate(40,32)">
    <rect width="138" height="28" rx="14" fill="rgba(0,240,255,0.14)" stroke="#00F0FF" stroke-width="1"/>
    <path d="M 16 14 L 19 8 L 22 14 L 28 14 L 23 18 L 25 24 L 19 21 L 13 24 L 15 18 L 10 14 Z" fill="#00F0FF"/>
    <text x="36" y="19" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#E0F2FE" letter-spacing="0.16em">AGENTIC AI · 2026</text>
  </g>

  <!-- Left: title block -->
  <g transform="translate(40,168)">
    <text font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="#F8FAFC" letter-spacing="-0.022em">
      <tspan x="0" dy="0">From visibility</tspan>
      <tspan x="0" dy="68">to execution.</tspan>
    </text>
    <text x="0" y="190" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#94A3B8" letter-spacing="-0.005em">
      <tspan x="0" dy="0">Agentic AI in the supply chain isn't a dashboard.</tspan>
      <tspan x="0" dy="32">It's a closed loop that sees, decides, and acts.</tspan>
    </text>
  </g>

  <!-- Right: 3-stage closed-loop diagram (Sense → Decide → Act) -->
  <g transform="translate(660,160)" filter="url(#cardShadow)">
    <!-- Stage 1: SENSE -->
    <rect x="0" y="0" width="200" height="116" rx="14" fill="url(#stageFill)" stroke="rgba(0,240,255,0.35)" stroke-width="1"/>
    <text x="20" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="#00F0FF" letter-spacing="0.18em">01 · SENSE</text>
    <text x="20" y="62" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#F8FAFC" letter-spacing="-0.015em">Lane signals</text>
    <text x="20" y="88" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">BOL · rate · capacity</text>
    <circle cx="178" cy="32" r="4" fill="#00F0FF"/>

    <!-- Arrow 1 -->
    <path d="M 208 58 L 254 58" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M 248 52 L 258 58 L 248 64" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Stage 2: DECIDE -->
    <rect x="262" y="0" width="200" height="116" rx="14" fill="url(#stageFill)" stroke="rgba(59,130,246,0.5)" stroke-width="1"/>
    <text x="282" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="#60A5FA" letter-spacing="0.18em">02 · DECIDE</text>
    <text x="282" y="62" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#F8FAFC" letter-spacing="-0.015em">Next best play</text>
    <text x="282" y="88" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">Route · price · who to call</text>
    <circle cx="440" cy="32" r="4" fill="#3B82F6"/>
  </g>

  <!-- Bottom-right: ACT stage + return arrow -->
  <g transform="translate(660,330)">
    <rect x="262" y="0" width="200" height="116" rx="14" fill="url(#stageFill)" stroke="rgba(139,92,246,0.45)" stroke-width="1" filter="url(#cardShadow)"/>
    <text x="282" y="32" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="#A78BFA" letter-spacing="0.18em">03 · ACT</text>
    <text x="282" y="62" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#F8FAFC" letter-spacing="-0.015em">Outreach fires</text>
    <text x="282" y="88" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94A3B8">Email · LinkedIn · call task</text>
    <circle cx="440" cy="32" r="4" fill="#8B5CF6"/>

    <!-- Return arrow from ACT (bottom) curving back to SENSE (top-left) -->
    <path d="M 362 116 Q 362 200 100 200 Q 0 200 0 80 L 0 -170" fill="none" stroke="rgba(0,240,255,0.45)" stroke-width="2" stroke-dasharray="6 6" stroke-linecap="round"/>
    <text x="186" y="218" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#67E8F9" letter-spacing="0.14em">FEEDBACK LOOP</text>
  </g>

  <!-- Bottom-left: outcome pills -->
  <g transform="translate(40,560)">
    <rect width="220" height="34" rx="17" fill="rgba(0,240,255,0.10)" stroke="#00F0FF" stroke-width="1"/>
    <circle cx="20" cy="17" r="4" fill="#00F0FF"/>
    <text x="34" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#E0F2FE" letter-spacing="0.06em">REPLY RATE · UP 2.4×</text>

    <rect x="0" y="48" width="220" height="34" rx="17" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1"/>
    <circle cx="20" cy="65" r="4" fill="#3B82F6"/>
    <text x="34" y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#DBEAFE" letter-spacing="0.06em">TIME TO ACTION · MINUTES</text>
  </g>
</svg>
