<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Pulse Coach: shipment-change signals into outbound triggers">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="curve" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00F0FF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cyanFog" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#cbg)"/>
  <circle cx="900" cy="430" r="540" fill="url(#cyanFog)"/>

  <!-- Faint horizontal grid -->
  <g stroke="#1E40AF" stroke-width="1" opacity="0.25">
    <path d="M0 220 H1600"/>
    <path d="M0 360 H1600"/>
    <path d="M0 500 H1600"/>
    <path d="M0 640 H1600"/>
  </g>

  <!-- Month markers -->
  <g font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="0.14em">
    <line x1="220" y1="730" x2="220" y2="750" stroke="#475569" stroke-width="1.5"/>
    <text x="220" y="772" text-anchor="middle">JAN</text>
    <line x1="450" y1="730" x2="450" y2="750" stroke="#475569" stroke-width="1.5"/>
    <text x="450" y="772" text-anchor="middle">FEB</text>
    <line x1="680" y1="730" x2="680" y2="750" stroke="#475569" stroke-width="1.5"/>
    <text x="680" y="772" text-anchor="middle">MAR</text>
    <line x1="910" y1="730" x2="910" y2="750" stroke="#475569" stroke-width="1.5"/>
    <text x="910" y="772" text-anchor="middle">APR</text>
    <line x1="1140" y1="730" x2="1140" y2="750" stroke="#475569" stroke-width="1.5"/>
    <text x="1140" y="772" text-anchor="middle">MAY</text>
    <line x1="1370" y1="730" x2="1370" y2="750" stroke="#475569" stroke-width="1.5"/>
    <text x="1370" y="772" text-anchor="middle">JUN</text>
  </g>

  <!-- Baseline (faint, dashed — what the shipper "would have done") -->
  <path d="M120 640 Q260 620 450 605 T680 580 Q800 565 910 555 T1140 540 Q1290 530 1480 525"
        fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4 7" opacity="0.45"/>

  <!-- Actual curve (cyan, the real story) -->
  <path d="M120 640 Q260 600 450 580 T680 480 Q800 400 910 360 T1140 280 Q1290 230 1480 200"
        fill="none" stroke="url(#curve)" stroke-width="5" stroke-linecap="round"/>

  <!-- Alert pins — all using brand-aligned palette -->
  <g>
    <!-- Carrier pivot — cyan -->
    <g transform="translate(680,480)">
      <circle r="14" fill="#00F0FF" stroke="#0F172A" stroke-width="2"/>
      <line x1="0" y1="14" x2="0" y2="34" stroke="#00F0FF" stroke-width="2"/>
      <rect x="-92" y="34" width="184" height="46" rx="8" fill="rgba(15,23,42,0.92)" stroke="#00F0FF" stroke-width="1"/>
      <text x="0" y="55" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#00F0FF" letter-spacing="0.1em">CARRIER PIVOT</text>
      <text x="0" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#E2E8F0">Maersk → MSC, 38% mix</text>
    </g>
    <!-- Volume spike — bright blue -->
    <g transform="translate(910,360)">
      <circle r="14" fill="#3B82F6" stroke="#0F172A" stroke-width="2"/>
      <line x1="0" y1="14" x2="0" y2="34" stroke="#3B82F6" stroke-width="2"/>
      <rect x="-100" y="34" width="200" height="46" rx="8" fill="rgba(15,23,42,0.92)" stroke="#3B82F6" stroke-width="1"/>
      <text x="0" y="55" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#60A5FA" letter-spacing="0.1em">VOLUME +32% MoM</text>
      <text x="0" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#E2E8F0">New VN origin lane</text>
    </g>
    <!-- New lane — cyan/teal -->
    <g transform="translate(1140,280)">
      <circle r="14" fill="#00F0FF" stroke="#0F172A" stroke-width="2"/>
      <line x1="0" y1="14" x2="0" y2="34" stroke="#00F0FF" stroke-width="2"/>
      <rect x="-90" y="34" width="180" height="46" rx="8" fill="rgba(15,23,42,0.92)" stroke="#00F0FF" stroke-width="1"/>
      <text x="0" y="55" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#00F0FF" letter-spacing="0.1em">NEW LANE</text>
      <text x="0" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#E2E8F0">USEC inbound, Mar 8</text>
    </g>
  </g>

  <!-- Y-axis label -->
  <text x="60" y="500" transform="rotate(-90,60,500)" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#64748B" letter-spacing="0.14em">SHIPMENT VOLUME</text>

  <!-- Title block top-left -->
  <g>
    <g transform="translate(120,80)">
      <rect width="34" height="34" rx="7" fill="rgba(0,240,255,0.18)" stroke="#00F0FF" stroke-width="1"/>
      <path d="M17 6 L20.2 13.6 L28 17 L20.2 20.4 L17 28 L13.8 20.4 L6 17 L13.8 13.6 Z" fill="#00F0FF"/>
    </g>
    <text x="170" y="105" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#00F0FF" letter-spacing="0.14em">PULSE COACH</text>
    <text x="120" y="148" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#F8FAFC" letter-spacing="-0.012em">Shipment changes → outbound triggers</text>
    <text x="120" y="178" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#94A3B8">Watching your saved accounts. Pinging the day a real signal lands.</text>
  </g>

  <!-- "LIVE FROM US CUSTOMS" pill bottom-right -->
  <g transform="translate(1300,820)">
    <rect width="220" height="36" rx="18" fill="rgba(0,240,255,0.12)" stroke="#00F0FF" stroke-width="1"/>
    <circle cx="22" cy="18" r="4" fill="#00F0FF"/>
    <text x="40" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#E0F2FE" letter-spacing="0.08em">LIVE FROM US CUSTOMS</text>
  </g>
</svg>
