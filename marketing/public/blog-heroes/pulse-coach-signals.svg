<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Pulse Coach: shipment-change signals into outbound triggers">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg4)"/>
  <!-- Horizontal time-line grid -->
  <g stroke="#3730A3" stroke-width="1" opacity="0.5">
    <path d="M0 200 H1600"/><path d="M0 400 H1600"/><path d="M0 600 H1600"/><path d="M0 800 H1600"/>
  </g>
  <!-- Vertical month markers -->
  <g font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#C7D2FE" letter-spacing="0.12em">
    <line x1="200" y1="780" x2="200" y2="810" stroke="#6366F1"/>
    <text x="200" y="840" text-anchor="middle">JAN</text>
    <line x1="430" y1="780" x2="430" y2="810" stroke="#6366F1"/>
    <text x="430" y="840" text-anchor="middle">FEB</text>
    <line x1="660" y1="780" x2="660" y2="810" stroke="#6366F1"/>
    <text x="660" y="840" text-anchor="middle">MAR</text>
    <line x1="890" y1="780" x2="890" y2="810" stroke="#6366F1"/>
    <text x="890" y="840" text-anchor="middle">APR</text>
    <line x1="1120" y1="780" x2="1120" y2="810" stroke="#6366F1"/>
    <text x="1120" y="840" text-anchor="middle">MAY</text>
    <line x1="1350" y1="780" x2="1350" y2="810" stroke="#6366F1"/>
    <text x="1350" y="840" text-anchor="middle">JUN</text>
  </g>
  <!-- Volume curve -->
  <path d="M120 600 Q260 540 430 560 T660 480 Q780 400 890 360 T1120 280 Q1280 220 1480 200"
        fill="none" stroke="url(#wave)" stroke-width="4" stroke-linecap="round"/>
  <!-- Faint pre-curve -->
  <path d="M120 620 Q260 600 430 590 T660 570 Q780 560 890 555 T1120 540 Q1280 530 1480 525"
        fill="none" stroke="#6366F1" stroke-width="2" stroke-dasharray="4 6" opacity="0.7"/>
  <!-- Alert pins -->
  <g>
    <g transform="translate(660,480)">
      <circle r="14" fill="#FBBF24"/>
      <circle r="6" fill="#1E1B4B"/>
      <line x1="0" y1="14" x2="0" y2="36" stroke="#FBBF24" stroke-width="2"/>
      <rect x="-90" y="36" width="180" height="44" rx="8" fill="rgba(15,23,42,0.9)" stroke="#FBBF24"/>
      <text x="0" y="60" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#FCD34D">CARRIER PIVOT</text>
      <text x="0" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#E2E8F0">Maersk → MSC</text>
    </g>
    <g transform="translate(890,360)">
      <circle r="14" fill="#34D399"/>
      <circle r="6" fill="#1E1B4B"/>
      <line x1="0" y1="14" x2="0" y2="36" stroke="#34D399" stroke-width="2"/>
      <rect x="-100" y="36" width="200" height="44" rx="8" fill="rgba(15,23,42,0.9)" stroke="#34D399"/>
      <text x="0" y="60" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#6EE7B7">VOLUME +32% MoM</text>
      <text x="0" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#E2E8F0">New origin: VN</text>
    </g>
    <g transform="translate(1120,280)">
      <circle r="14" fill="#F472B6"/>
      <circle r="6" fill="#1E1B4B"/>
      <line x1="0" y1="14" x2="0" y2="36" stroke="#F472B6" stroke-width="2"/>
      <rect x="-90" y="36" width="180" height="44" rx="8" fill="rgba(15,23,42,0.9)" stroke="#F472B6"/>
      <text x="0" y="60" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#F9A8D4">NEW LANE</text>
      <text x="0" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#E2E8F0">USEC inbound</text>
    </g>
  </g>
  <!-- Y-axis title -->
  <g font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#C4B5FD" letter-spacing="0.12em">
    <text x="60" y="500" transform="rotate(-90,60,500)">SHIPMENT VOLUME</text>
  </g>
  <!-- Main title -->
  <text x="120" y="120" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="800" fill="#F8FAFC" letter-spacing="-0.01em">Pulse Coach signals</text>
  <text x="120" y="160" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#C4B5FD" letter-spacing="0.06em">SHIPMENT CHANGES → OUTBOUND TRIGGERS</text>
</svg>
