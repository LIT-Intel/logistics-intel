<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="Introducing Pulse AI — freight account brief for Samsung Electronics in 90 seconds">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="headerBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="brandGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="modalShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="900" cy="360" r="420" fill="url(#brandGlow)"/>
  <circle cx="200" cy="200" r="280" fill="url(#cyanGlow)"/>

  <!-- Top-left brand badge -->
  <g transform="translate(40,32)">
    <rect width="116" height="28" rx="14" fill="rgba(0,240,255,0.14)" stroke="#00F0FF" stroke-width="1"/>
    <path d="M 16 14 L 19 8 L 22 14 L 28 14 L 23 18 L 25 24 L 19 21 L 13 24 L 15 18 L 10 14 Z" fill="#00F0FF"/>
    <text x="36" y="19" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#E0F2FE" letter-spacing="0.16em">PULSE AI</text>
  </g>

  <!-- Left: title block -->
  <g transform="translate(40,170)">
    <text font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="#F8FAFC" letter-spacing="-0.022em">
      <tspan x="0" dy="0">Introducing</tspan>
      <tspan x="0" dy="68">Pulse AI</tspan>
    </text>
    <text x="0" y="190" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#94A3B8" letter-spacing="-0.005em">
      <tspan x="0" dy="0">A complete freight account brief</tspan>
      <tspan x="0" dy="32">in 90 seconds. Live from US Customs.</tspan>
    </text>
    <!-- Source pill -->
    <g transform="translate(0,272)">
      <rect width="248" height="34" rx="17" fill="rgba(0,240,255,0.10)" stroke="#00F0FF" stroke-width="1"/>
      <circle cx="20" cy="17" r="4" fill="#00F0FF">
        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="36" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#E0F2FE" letter-spacing="0.12em">2,055 SHIPMENTS · LIVE FROM BOL</text>
    </g>
  </g>

  <!-- Right: Pulse Brief modal mockup -->
  <g transform="translate(605,58)" filter="url(#modalShadow)">
    <rect width="558" height="604" rx="14" fill="#FBFCFE"/>

    <!-- Modal header -->
    <g>
      <rect width="558" height="78" rx="14" fill="url(#headerBar)"/>
      <rect y="64" width="558" height="14" fill="url(#headerBar)"/>
      <line x1="0" y1="77" x2="558" y2="77" stroke="#00F0FF" stroke-width="1" opacity="0.35"/>

      <!-- Sparkle + label -->
      <g transform="translate(18,18)">
        <path d="M 8 0 L 10 6 L 16 8 L 10 10 L 8 16 L 6 10 L 0 8 L 6 6 Z" fill="#00F0FF"/>
      </g>
      <text x="42" y="26" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="#00F0FF" letter-spacing="0.14em">PULSE AI · ACCOUNT INTELLIGENCE</text>

      <!-- Samsung brand mark on right side of header -->
      <g transform="translate(420,12)">
        <rect width="118" height="22" rx="11" fill="rgba(20,40,160,0.85)"/>
        <text x="59" y="16" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="0.18em">SAMSUNG</text>
      </g>

      <!-- Company name + meta -->
      <text x="18" y="56" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC" letter-spacing="-0.012em">Samsung Electronics</text>
      <text x="18" y="72" font-family="ui-monospace, SF Mono, monospace" font-size="10.5" fill="#CBD5E1">Ridgefield Park, NJ · 6,535 TEU/yr · Electronics</text>
    </g>

    <!-- Section 01: Executive Summary -->
    <g transform="translate(18,98)">
      <rect width="20" height="20" rx="4" fill="#E6FBFF" stroke="#00F0FF" stroke-width="1"/>
      <text x="10" y="14" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="9" font-weight="800" fill="#0F172A">01</text>
      <text x="28" y="14" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Executive Account Summary</text>
    </g>
    <g transform="translate(18,128)">
      <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#334155">
        <tspan x="0" dy="0">High-volume, 100% FCL trans-Pacific electronics program</tspan>
        <tspan x="0" dy="16">run out of Ridgefield Park, NJ. 2,055 ocean BOL filings, 6,535</tspan>
        <tspan x="0" dy="16">TEU, $166.3M declared customs value (TTM). Heavy unit-value</tspan>
        <tspan x="0" dy="16">density signals value-based freight, not commodity capacity.</tspan>
      </text>
    </g>

    <!-- Section 02: KPI strip -->
    <g transform="translate(18,212)">
      <rect width="20" height="20" rx="4" fill="#E6FBFF" stroke="#00F0FF" stroke-width="1"/>
      <text x="10" y="14" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="9" font-weight="800" fill="#0F172A">02</text>
      <text x="28" y="14" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Trade Activity Snapshot</text>
    </g>
    <g transform="translate(18,238)">
      <g>
        <rect width="125" height="60" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
        <text x="12" y="20" font-family="Inter, system-ui, sans-serif" font-size="8.5" font-weight="800" fill="#64748B" letter-spacing="0.1em">12M TEU</text>
        <text x="12" y="44" font-family="ui-monospace, SF Mono, monospace" font-size="18" font-weight="700" fill="#1D4ED8">6,535</text>
      </g>
      <g transform="translate(131,0)">
        <rect width="125" height="60" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
        <text x="12" y="20" font-family="Inter, system-ui, sans-serif" font-size="8.5" font-weight="800" fill="#64748B" letter-spacing="0.1em">SHIPMENTS</text>
        <text x="12" y="44" font-family="ui-monospace, SF Mono, monospace" font-size="18" font-weight="700" fill="#1D4ED8">2,055</text>
      </g>
      <g transform="translate(262,0)">
        <rect width="125" height="60" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
        <text x="12" y="20" font-family="Inter, system-ui, sans-serif" font-size="8.5" font-weight="800" fill="#64748B" letter-spacing="0.1em">DECLARED VALUE</text>
        <text x="12" y="44" font-family="ui-monospace, SF Mono, monospace" font-size="18" font-weight="700" fill="#1D4ED8">$166.3M</text>
      </g>
      <g transform="translate(393,0)">
        <rect width="125" height="60" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
        <text x="12" y="20" font-family="Inter, system-ui, sans-serif" font-size="8.5" font-weight="800" fill="#64748B" letter-spacing="0.1em">LCL SHARE</text>
        <text x="12" y="44" font-family="ui-monospace, SF Mono, monospace" font-size="18" font-weight="700" fill="#1D4ED8">0%</text>
      </g>
    </g>

    <!-- Section 03: Opportunity Signals -->
    <g transform="translate(18,318)">
      <rect width="20" height="20" rx="4" fill="#E6FBFF" stroke="#00F0FF" stroke-width="1"/>
      <text x="10" y="14" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="9" font-weight="800" fill="#0F172A">03</text>
      <text x="28" y="14" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Opportunity Signals</text>
    </g>
    <g transform="translate(18,344)">
      <g>
        <rect width="258" height="62" rx="8" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.3)"/>
        <text x="12" y="20" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="800" fill="#10B981" letter-spacing="0.12em">BUYING SIGNAL</text>
        <text x="12" y="38" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#0F172A">FCL share 100%; lane stability suggests</text>
        <text x="12" y="52" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#0F172A">contracted allocation — RFP cycle live.</text>
      </g>
      <g transform="translate(264,0)">
        <rect width="258" height="62" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.3)"/>
        <text x="12" y="20" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="800" fill="#3B82F6" letter-spacing="0.12em">CARRIER OPPORTUNITY</text>
        <text x="12" y="38" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#0F172A">High value/TEU ($25.4K) — pricing</text>
        <text x="12" y="52" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#0F172A">conversation is value-based, not capacity.</text>
      </g>
    </g>
    <g transform="translate(18,412)">
      <g>
        <rect width="258" height="62" rx="8" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.3)"/>
        <text x="12" y="20" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="800" fill="#F59E0B" letter-spacing="0.12em">FORWARDER DISPLACEMENT</text>
        <text x="12" y="38" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#0F172A">No single incumbent dominance —</text>
        <text x="12" y="52" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#0F172A">multi-vendor RFP environment.</text>
      </g>
      <g transform="translate(264,0)">
        <rect width="258" height="62" rx="8" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.3)"/>
        <text x="12" y="20" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="800" fill="#8B5CF6" letter-spacing="0.12em">SUPPLIER SIGNAL</text>
        <text x="12" y="38" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#0F172A">Pan-Asia supplier base diversified —</text>
        <text x="12" y="52" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#0F172A">capacity flexibility is buyer leverage.</text>
      </g>
    </g>

    <!-- Section 04: Outreach Hook preview -->
    <g transform="translate(18,488)">
      <rect width="20" height="20" rx="4" fill="#E6FBFF" stroke="#00F0FF" stroke-width="1"/>
      <text x="10" y="14" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="9" font-weight="800" fill="#0F172A">04</text>
      <text x="28" y="14" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Suggested Outreach Hook</text>
    </g>
    <g transform="translate(18,514)">
      <rect width="522" height="58" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
      <g transform="translate(12,12)">
        <rect width="42" height="14" rx="3" fill="rgba(37,99,235,0.1)" stroke="rgba(37,99,235,0.3)"/>
        <text x="21" y="10" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="8" font-weight="800" fill="#2563EB">EMAIL</text>
      </g>
      <text x="12" y="44" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F172A">Subject: value-density freight on the Samsung Ridgefield Park lane</text>
    </g>

    <!-- Confidence footer -->
    <g transform="translate(0,582)">
      <rect width="558" height="22" rx="0" fill="#F8FAFC"/>
      <text x="18" y="15" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">Was this brief useful?</text>
      <g transform="translate(432,4)">
        <rect width="108" height="14" rx="7" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)"/>
        <text x="54" y="11" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="9" font-weight="700" fill="#059669">Confidence 95%</text>
      </g>
    </g>
  </g>
</svg>
