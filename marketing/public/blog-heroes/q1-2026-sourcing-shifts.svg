<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Q1 2026 sourcing shifts across 3,500 US importers">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="barAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg3)"/>
  <!-- Y-axis grid lines -->
  <g stroke="#1E3A5F" stroke-width="1" opacity="0.55">
    <path d="M120 200 H1480"/><path d="M120 340 H1480"/><path d="M120 480 H1480"/><path d="M120 620 H1480"/><path d="M120 760 H1480"/>
  </g>
  <!-- Axis labels -->
  <g font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#94A3B8" letter-spacing="0.08em">
    <text x="105" y="205" text-anchor="end">+30%</text>
    <text x="105" y="345" text-anchor="end">+15%</text>
    <text x="105" y="485" text-anchor="end">0</text>
    <text x="105" y="625" text-anchor="end">-15%</text>
    <text x="105" y="765" text-anchor="end">-30%</text>
  </g>
  <!-- Zero baseline -->
  <line x1="120" y1="480" x2="1480" y2="480" stroke="#475569" stroke-width="2"/>
  <!-- Bars - paired (Q1 vs YoY) -->
  <g>
    <rect x="170" y="300" width="60" height="180" fill="url(#bar)" rx="4"/>
    <rect x="240" y="380" width="60" height="100" fill="url(#barAmber)" rx="4"/>
    <text x="235" y="800" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#CBD5E1" letter-spacing="0.06em">CN→USWC</text>

    <rect x="370" y="220" width="60" height="260" fill="url(#bar)" rx="4"/>
    <rect x="440" y="340" width="60" height="140" fill="url(#barAmber)" rx="4"/>
    <text x="435" y="800" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#CBD5E1" letter-spacing="0.06em">VN→USWC</text>

    <rect x="570" y="270" width="60" height="210" fill="url(#bar)" rx="4"/>
    <rect x="640" y="420" width="60" height="60" fill="url(#barAmber)" rx="4"/>
    <text x="635" y="800" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#CBD5E1" letter-spacing="0.06em">MX→USGC</text>

    <rect x="770" y="480" width="60" height="200" fill="url(#bar)" rx="4" opacity="0.85"/>
    <rect x="840" y="480" width="60" height="120" fill="url(#barAmber)" rx="4" opacity="0.85"/>
    <text x="835" y="800" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#CBD5E1" letter-spacing="0.06em">CN→USEC</text>

    <rect x="970" y="320" width="60" height="160" fill="url(#bar)" rx="4"/>
    <rect x="1040" y="400" width="60" height="80" fill="url(#barAmber)" rx="4"/>
    <text x="1035" y="800" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#CBD5E1" letter-spacing="0.06em">IN→USEC</text>

    <rect x="1170" y="480" width="60" height="160" fill="url(#bar)" rx="4" opacity="0.85"/>
    <rect x="1240" y="480" width="60" height="60" fill="url(#barAmber)" rx="4" opacity="0.85"/>
    <text x="1235" y="800" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#CBD5E1" letter-spacing="0.06em">TH→USWC</text>
  </g>
  <!-- Legend -->
  <g transform="translate(120,105)" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">
    <rect x="0" y="0" width="18" height="18" fill="url(#bar)" rx="3"/>
    <text x="28" y="14" fill="#E0F2FE">Q1 2026 TEU</text>
    <rect x="160" y="0" width="18" height="18" fill="url(#barAmber)" rx="3"/>
    <text x="188" y="14" fill="#FDE68A">YoY change</text>
  </g>
  <!-- Title -->
  <text x="120" y="80" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#F8FAFC" letter-spacing="-0.01em">Q1 2026 sourcing shifts</text>
</svg>
