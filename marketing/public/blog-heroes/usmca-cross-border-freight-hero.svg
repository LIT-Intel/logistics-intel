<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="US-Mexico USMCA review 2026 — cross-border freight compliance flow with Laredo border crossing, USMCA preference, IEEPA tariffs, and Section 232 metals at every node">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0.85" cy="0.22" r="0.55">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="brandGlow" cx="0.18" cy="0.88" r="0.5">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="laneCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#00F0FF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="laneAmber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="laneRose" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FB7185" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#FB7185" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FB7185" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1020" cy="172" r="420" fill="url(#cyanGlow)"/>
  <circle cx="180" cy="620" r="320" fill="url(#brandGlow)"/>

  <!-- Top-left brand badge -->
  <g transform="translate(40,32)">
    <rect width="170" height="28" rx="14" fill="rgba(0,240,255,0.14)" stroke="#00F0FF" stroke-width="1"/>
    <path d="M 16 14 L 19 8 L 22 14 L 28 14 L 23 18 L 25 24 L 19 21 L 13 24 L 15 18 L 10 14 Z" fill="#00F0FF"/>
    <text x="36" y="19" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#E0F2FE" letter-spacing="0.16em">USMCA REVIEW · 2026</text>
  </g>

  <!-- Left: title block -->
  <g transform="translate(40,168)">
    <text font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="#F8FAFC" letter-spacing="-0.022em">
      <tspan x="0" dy="0">Origin, tariffs,</tspan>
      <tspan x="0" dy="68">and the border.</tspan>
    </text>
    <text x="0" y="190" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#94A3B8" letter-spacing="-0.005em">
      <tspan x="0" dy="0">The 2026 USMCA review reshapes compliance for</tspan>
      <tspan x="0" dy="32">forwarders, brokers, and 3PLs.</tspan>
    </text>
  </g>

  <!-- Bottom-left: outcome pills -->
  <g transform="translate(40,560)">
    <rect width="270" height="34" rx="17" fill="rgba(0,240,255,0.10)" stroke="#00F0FF" stroke-width="1"/>
    <circle cx="20" cy="17" r="4" fill="#00F0FF"/>
    <text x="34" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#E0F2FE" letter-spacing="0.06em">$872.8B · U.S.-MEX TRADE · 2025</text>

    <rect x="0" y="48" width="270" height="34" rx="17" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1"/>
    <circle cx="20" cy="65" r="4" fill="#3B82F6"/>
    <text x="34" y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#DBEAFE" letter-spacing="0.06em">73.6% · TRUCKED · BY VALUE</text>
  </g>

  <!-- Right: US-MEX border crossing diagram -->
  <g transform="translate(620,90)" filter="url(#cardShadow)">
    <!-- Diagram surface -->
    <rect x="0" y="0" width="540" height="540" rx="20" fill="rgba(15,23,42,0.55)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Faint country labels (ghost type) -->
    <text x="500" y="62" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="84" font-weight="900" fill="#F8FAFC" fill-opacity="0.04" letter-spacing="-0.04em">US</text>
    <text x="40" y="510" font-family="Inter, system-ui, sans-serif" font-size="84" font-weight="900" fill="#F8FAFC" fill-opacity="0.04" letter-spacing="-0.04em">MX</text>

    <!-- Subtle latitude grid for texture -->
    <g stroke="rgba(148,163,184,0.06)" stroke-width="1" stroke-dasharray="3 6">
      <line x1="30" y1="160" x2="510" y2="160"/>
      <line x1="30" y1="380" x2="510" y2="380"/>
    </g>

    <!-- Lane 1 (top): USMCA · 0% — cyan -->
    <path d="M 30 200 C 180 180, 360 220, 510 200" fill="none" stroke="url(#laneCyan)" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 6"/>
    <g transform="translate(370,176)">
      <rect width="124" height="22" rx="11" fill="rgba(0,240,255,0.18)" stroke="#00F0FF" stroke-width="1"/>
      <text x="62" y="15" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="#A5F3FC" letter-spacing="0.10em">USMCA · 0%</text>
    </g>

    <!-- Border line (horizontal) -->
    <line x1="30" y1="270" x2="510" y2="270" stroke="rgba(248,250,252,0.32)" stroke-width="1.2" stroke-dasharray="2 4"/>
    <text x="30" y="262" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="800" fill="#94A3B8" letter-spacing="0.20em">U.S. — MEXICO BORDER</text>

    <!-- Laredo node + chip -->
    <g transform="translate(254,256)">
      <circle r="14" fill="rgba(0,240,255,0.18)" stroke="#00F0FF" stroke-width="1.5"/>
      <circle r="4.5" fill="#00F0FF"/>
    </g>
    <g transform="translate(290,254)">
      <rect width="172" height="26" rx="13" fill="rgba(0,240,255,0.12)" stroke="rgba(0,240,255,0.55)" stroke-width="1"/>
      <text x="86" y="17" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="#E0F2FE" letter-spacing="0.12em">LAREDO · 38.8% INBOUND</text>
    </g>
    <text x="230" y="251" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="0.10em">TX</text>

    <!-- Lane 2 (mid): NON-COMPLIANT · 25% — amber -->
    <path d="M 30 320 C 200 300, 340 340, 510 310" fill="none" stroke="url(#laneAmber)" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 6"/>
    <g transform="translate(340,332)">
      <rect width="170" height="22" rx="11" fill="rgba(245,158,11,0.18)" stroke="#F59E0B" stroke-width="1"/>
      <text x="85" y="15" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="#FCD34D" letter-spacing="0.10em">NON-COMPLIANT · 25%</text>
    </g>

    <!-- Lane 3 (bottom): SECTION 232 · 50% — rose -->
    <path d="M 30 420 C 180 400, 360 440, 510 420" fill="none" stroke="url(#laneRose)" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 6"/>
    <g transform="translate(360,442)">
      <rect width="148" height="22" rx="11" fill="rgba(251,113,133,0.18)" stroke="#FB7185" stroke-width="1"/>
      <text x="74" y="15" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="#FECDD3" letter-spacing="0.10em">SECTION 232 · 50%</text>
    </g>

    <!-- Tiny truck glyph on the Laredo node -->
    <g transform="translate(244,278)" opacity="0.85">
      <rect x="0" y="2" width="16" height="8" rx="1.5" fill="#00F0FF"/>
      <rect x="16" y="0" width="6" height="10" rx="1" fill="#67E8F9"/>
      <circle cx="5" cy="12" r="2" fill="#0B1220" stroke="#00F0FF" stroke-width="1"/>
      <circle cx="18" cy="12" r="2" fill="#0B1220" stroke="#00F0FF" stroke-width="1"/>
    </g>

    <!-- Bottom-right: footer note -->
    <text x="510" y="516" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="600" fill="#475569" letter-spacing="0.06em">U.S. CBP · USTR · BTS · 2025-2026</text>
  </g>
</svg>
