<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="The LIT contact graph — 5 to 30 verified buyer-side contacts per importer">
  <defs>
    <linearGradient id="cg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="cg-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFCFE"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <radialGradient id="cg-glow" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="cg-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#cg-bg)"/>
  <circle cx="900" cy="360" r="420" fill="url(#cg-glow)"/>

  <!-- Top-left brand badge -->
  <g transform="translate(40,32)">
    <rect width="166" height="28" rx="14" fill="rgba(0,240,255,0.14)" stroke="#00F0FF" stroke-width="1"/>
    <circle cx="20" cy="14" r="4" fill="#00F0FF"/>
    <text x="36" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#E0F2FE" letter-spacing="0.16em">LIT CONTACT GRAPH</text>
  </g>

  <!-- Left: title block -->
  <g transform="translate(40,160)">
    <text font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#F8FAFC" letter-spacing="-0.022em">
      <tspan x="0" dy="0">8 personas.</tspan>
      <tspan x="0" dy="64">5-30 contacts.</tspan>
      <tspan x="0" dy="64"><tspan fill="#00F0FF">Verified weekly.</tspan></tspan>
    </text>
    <text x="0" y="252" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#94A3B8">
      <tspan x="0" dy="0">Procurement. Supply chain. Logistics.</tspan>
      <tspan x="0" dy="26">Freight ops. Customs. Trade compliance.</tspan>
      <tspan x="0" dy="26">Pre-built on every importer profile.</tspan>
    </text>
    <g transform="translate(0,344)">
      <rect width="232" height="32" rx="16" fill="rgba(16,185,129,0.10)" stroke="#10B981" stroke-width="1"/>
      <circle cx="20" cy="16" r="4" fill="#10B981"/>
      <text x="36" y="21" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#A7F3D0" letter-spacing="0.14em">DELIVERABILITY &gt; 95%</text>
    </g>
  </g>

  <!-- Right: contact list panel -->
  <g transform="translate(610,80)" filter="url(#cg-shadow)">
    <rect width="550" height="560" rx="14" fill="url(#cg-card)"/>
    <g transform="translate(20,20)">
      <text font-family="ui-monospace, SF Mono, monospace" font-size="10" font-weight="800" fill="#64748B" letter-spacing="0.16em">WALMART INC. · BUYER-SIDE CONTACTS</text>
      <text x="0" y="30" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0F172A">22 verified contacts</text>
      <text x="0" y="52" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#64748B">Re-checked within last 14 days · Showing 6 of 22</text>
    </g>

    <!-- Contact rows -->
    <g transform="translate(20,116)" font-family="Inter, system-ui, sans-serif">
      <!-- Row 1: Procurement -->
      <g>
        <rect width="510" height="58" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
        <circle cx="32" cy="29" r="18" fill="#DBEAFE"/>
        <text x="32" y="34" text-anchor="middle" font-size="12" font-weight="800" fill="#1D4ED8">JM</text>
        <text x="60" y="22" font-size="13" font-weight="700" fill="#0F172A">VP, Procurement</text>
        <text x="60" y="40" font-size="11.5" font-weight="500" fill="#64748B">Bentonville, AR · Walmart Inc.</text>
        <g transform="translate(390,18)">
          <rect width="100" height="22" rx="11" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
          <text x="50" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">Deliverable</text>
        </g>
      </g>
      <!-- Row 2: Supply Chain -->
      <g transform="translate(0,68)">
        <rect width="510" height="58" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
        <circle cx="32" cy="29" r="18" fill="#D1FAE5"/>
        <text x="32" y="34" text-anchor="middle" font-size="12" font-weight="800" fill="#059669">SD</text>
        <text x="60" y="22" font-size="13" font-weight="700" fill="#0F172A">Director, Supply Chain</text>
        <text x="60" y="40" font-size="11.5" font-weight="500" fill="#64748B">Bentonville, AR · Walmart Inc.</text>
        <g transform="translate(390,18)">
          <rect width="100" height="22" rx="11" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
          <text x="50" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">Deliverable</text>
        </g>
      </g>
      <!-- Row 3: Logistics -->
      <g transform="translate(0,136)">
        <rect width="510" height="58" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
        <circle cx="32" cy="29" r="18" fill="#FEF3C7"/>
        <text x="32" y="34" text-anchor="middle" font-size="12" font-weight="800" fill="#B45309">RL</text>
        <text x="60" y="22" font-size="13" font-weight="700" fill="#0F172A">Head of Logistics &amp; Imports</text>
        <text x="60" y="40" font-size="11.5" font-weight="500" fill="#64748B">Bentonville, AR · Walmart Inc.</text>
        <g transform="translate(390,18)">
          <rect width="100" height="22" rx="11" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
          <text x="50" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">Deliverable</text>
        </g>
      </g>
      <!-- Row 4: Customs -->
      <g transform="translate(0,204)">
        <rect width="510" height="58" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
        <circle cx="32" cy="29" r="18" fill="#FCE7F3"/>
        <text x="32" y="34" text-anchor="middle" font-size="12" font-weight="800" fill="#BE185D">KT</text>
        <text x="60" y="22" font-size="13" font-weight="700" fill="#0F172A">Manager, Customs Compliance</text>
        <text x="60" y="40" font-size="11.5" font-weight="500" fill="#64748B">Bentonville, AR · Walmart Inc.</text>
        <g transform="translate(390,18)">
          <rect width="100" height="22" rx="11" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
          <text x="50" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#B45309">Re-checking</text>
        </g>
      </g>
      <!-- Row 5: Freight Ops -->
      <g transform="translate(0,272)">
        <rect width="510" height="58" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
        <circle cx="32" cy="29" r="18" fill="#E0E7FF"/>
        <text x="32" y="34" text-anchor="middle" font-size="12" font-weight="800" fill="#4338CA">AW</text>
        <text x="60" y="22" font-size="13" font-weight="700" fill="#0F172A">Sr. Manager, Freight Operations</text>
        <text x="60" y="40" font-size="11.5" font-weight="500" fill="#64748B">Bentonville, AR · Walmart Inc.</text>
        <g transform="translate(390,18)">
          <rect width="100" height="22" rx="11" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
          <text x="50" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">Deliverable</text>
        </g>
      </g>
      <!-- Row 6: Finance / Audit -->
      <g transform="translate(0,340)">
        <rect width="510" height="58" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
        <circle cx="32" cy="29" r="18" fill="#E0F2FE"/>
        <text x="32" y="34" text-anchor="middle" font-size="12" font-weight="800" fill="#0369A1">PB</text>
        <text x="60" y="22" font-size="13" font-weight="700" fill="#0F172A">Freight Audit Lead, Finance</text>
        <text x="60" y="40" font-size="11.5" font-weight="500" fill="#64748B">Bentonville, AR · Walmart Inc.</text>
        <g transform="translate(390,18)">
          <rect width="100" height="22" rx="11" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
          <text x="50" y="15" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">Deliverable</text>
        </g>
      </g>
    </g>
  </g>
</svg>
