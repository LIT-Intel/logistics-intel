<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="Two ways to find your next account — Search and Pulse Search inside LIT">
  <defs>
    <linearGradient id="s-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="s-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFCFE"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <radialGradient id="s-glow" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="s-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#s-bg)"/>
  <circle cx="900" cy="360" r="420" fill="url(#s-glow)"/>

  <!-- Top-left brand badge -->
  <g transform="translate(40,32)">
    <rect width="148" height="28" rx="14" fill="rgba(0,240,255,0.14)" stroke="#00F0FF" stroke-width="1"/>
    <path d="M 16 14 L 19 8 L 22 14 L 28 14 L 23 18 L 25 24 L 19 21 L 13 24 L 15 18 L 10 14 Z" fill="#00F0FF"/>
    <text x="34" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#E0F2FE" letter-spacing="0.14em">LIT PROSPECTING</text>
  </g>

  <!-- Left: title block -->
  <g transform="translate(40,160)">
    <text font-family="Inter, system-ui, sans-serif" font-size="50" font-weight="800" fill="#F8FAFC" letter-spacing="-0.022em">
      <tspan x="0" dy="0">Two ways</tspan>
      <tspan x="0" dy="58">to find your</tspan>
      <tspan x="0" dy="58"><tspan fill="#00F0FF">next account.</tspan></tspan>
    </text>
    <text x="0" y="248" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#94A3B8">
      <tspan x="0" dy="0">Search when you know the name.</tspan>
      <tspan x="0" dy="26">Pulse Search when you don&apos;t.</tspan>
    </text>
  </g>

  <!-- Right column: two stacked UI mockups -->

  <!-- TOP: Search UI -->
  <g transform="translate(610,80)" filter="url(#s-shadow)">
    <rect width="550" height="260" rx="14" fill="url(#s-card)"/>
    <!-- header -->
    <g transform="translate(20,18)">
      <rect width="62" height="18" rx="4" fill="#DBEAFE"/>
      <text x="31" y="13" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="9" font-weight="800" fill="#1D4ED8" letter-spacing="0.1em">SEARCH</text>
      <text x="74" y="13" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748B">Known target · deep lookup</text>
    </g>
    <!-- search bar -->
    <g transform="translate(20,52)">
      <rect width="510" height="46" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
      <circle cx="22" cy="23" r="8" stroke="#64748B" stroke-width="2" fill="none"/>
      <line x1="28" y1="29" x2="34" y2="35" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
      <text x="46" y="29" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#0F172A">Costco Wholesale</text>
      <text x="496" y="29" text-anchor="end" font-family="ui-monospace, SF Mono, monospace" font-size="10" font-weight="700" fill="#10B981">↵ ENTER</text>
    </g>
    <!-- result preview -->
    <g transform="translate(20,118)">
      <rect width="510" height="118" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
      <text x="14" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#64748B" letter-spacing="0.1em">1 EXACT MATCH</text>
      <text x="14" y="42" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#0F172A">Costco Wholesale</text>
      <text x="14" y="60" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748B">Issaquah, WA · /companies/costco-com</text>
      <g transform="translate(14,72)">
        <rect width="120" height="34" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/>
        <text x="60" y="14" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="800" fill="#64748B" letter-spacing="0.1em">TTM TEU</text>
        <text x="60" y="28" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="14" font-weight="700" fill="#1D4ED8">1,083</text>
      </g>
      <g transform="translate(140,72)">
        <rect width="120" height="34" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/>
        <text x="60" y="14" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="800" fill="#64748B" letter-spacing="0.1em">SHIPMENTS</text>
        <text x="60" y="28" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="14" font-weight="700" fill="#1D4ED8">542</text>
      </g>
      <g transform="translate(266,72)">
        <rect width="120" height="34" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/>
        <text x="60" y="14" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="800" fill="#64748B" letter-spacing="0.1em">VALUE</text>
        <text x="60" y="28" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="14" font-weight="700" fill="#1D4ED8">$20.0M</text>
      </g>
      <g transform="translate(392,72)">
        <rect width="104" height="34" rx="6" fill="#10B981"/>
        <text x="52" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Open profile →</text>
      </g>
    </g>
  </g>

  <!-- BOTTOM: Pulse Search UI -->
  <g transform="translate(610,358)" filter="url(#s-shadow)">
    <rect width="550" height="260" rx="14" fill="url(#s-card)"/>
    <!-- header -->
    <g transform="translate(20,18)">
      <rect width="80" height="18" rx="4" fill="#E0F2FE"/>
      <text x="40" y="13" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="9" font-weight="800" fill="#0369A1" letter-spacing="0.1em">PULSE SEARCH</text>
      <text x="108" y="13" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748B">Open query · ranked discovery</text>
    </g>
    <!-- search bar with NL query -->
    <g transform="translate(20,52)">
      <rect width="510" height="46" rx="10" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="1.5"/>
      <path d="M 16 16 L 19 22 L 25 24 L 19 26 L 16 32 L 13 26 L 7 24 L 13 22 Z" fill="#00F0FF"/>
      <text x="34" y="29" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#0F172A">Apparel importers shipping from Vietnam &gt;50 TEU</text>
    </g>
    <!-- ranked result list -->
    <g transform="translate(20,118)">
      <rect width="510" height="118" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
      <text x="14" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#64748B" letter-spacing="0.1em">87 RANKED RESULTS · TOP 3</text>
      <g transform="translate(14,30)" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#0F172A">
        <g transform="translate(0,0)">
          <text x="20" y="14" text-anchor="end" font-family="ui-monospace, SF Mono, monospace" font-weight="800" fill="#0369A1">01</text>
          <text x="32" y="14">Levi Strauss &amp; Co.</text>
          <text x="380" y="14" font-family="ui-monospace, SF Mono, monospace" font-size="11" fill="#64748B">432 TEU · VN→USWC</text>
        </g>
        <g transform="translate(0,24)">
          <text x="20" y="14" text-anchor="end" font-family="ui-monospace, SF Mono, monospace" font-weight="800" fill="#0369A1">02</text>
          <text x="32" y="14">Gap Inc.</text>
          <text x="380" y="14" font-family="ui-monospace, SF Mono, monospace" font-size="11" fill="#64748B">287 TEU · VN→USWC</text>
        </g>
        <g transform="translate(0,48)">
          <text x="20" y="14" text-anchor="end" font-family="ui-monospace, SF Mono, monospace" font-weight="800" fill="#0369A1">03</text>
          <text x="32" y="14">PVH Corp.</text>
          <text x="380" y="14" font-family="ui-monospace, SF Mono, monospace" font-size="11" fill="#64748B">194 TEU · VN→USEC</text>
        </g>
        <g transform="translate(0,72)">
          <rect width="480" height="20" rx="4" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1"/>
          <text x="240" y="14" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0369A1">+ 84 more · refine query →</text>
        </g>
      </g>
    </g>
  </g>
</svg>
