<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="Pulse Coach — real signal alerts from watched importer accounts">
  <defs>
    <linearGradient id="c-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="c-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFCFE"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <radialGradient id="c-glow" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="c-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#c-bg)"/>
  <circle cx="900" cy="360" r="420" fill="url(#c-glow)"/>

  <!-- Top-left brand badge -->
  <g transform="translate(40,32)">
    <rect width="140" height="28" rx="14" fill="rgba(0,240,255,0.14)" stroke="#00F0FF" stroke-width="1"/>
    <path d="M 16 14 L 19 8 L 22 14 L 28 14 L 23 18 L 25 24 L 19 21 L 13 24 L 15 18 L 10 14 Z" fill="#00F0FF"/>
    <text x="34" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#E0F2FE" letter-spacing="0.16em">PULSE COACH</text>
  </g>

  <!-- Left: title block -->
  <g transform="translate(40,160)">
    <text font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#F8FAFC" letter-spacing="-0.022em">
      <tspan x="0" dy="0">Signals</tspan>
      <tspan x="0" dy="60">into outbound</tspan>
      <tspan x="0" dy="60" fill="#00F0FF">triggers.</tspan>
    </text>
    <text x="0" y="240" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#94A3B8">
      <tspan x="0" dy="0">Coach watches your saved accounts.</tspan>
      <tspan x="0" dy="26">Pings you the day a real change lands.</tspan>
    </text>
    <g transform="translate(0,318)">
      <rect width="240" height="32" rx="16" fill="rgba(0,240,255,0.10)" stroke="#00F0FF" stroke-width="1"/>
      <circle cx="20" cy="16" r="4" fill="#00F0FF">
        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="36" y="21" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#E0F2FE" letter-spacing="0.14em">3 NEW SIGNALS THIS WEEK</text>
    </g>
  </g>

  <!-- Right: alert feed panel -->
  <g transform="translate(610,80)" filter="url(#c-shadow)">
    <rect width="550" height="560" rx="14" fill="url(#c-card)"/>
    <g transform="translate(20,20)">
      <text font-family="ui-monospace, SF Mono, monospace" font-size="10" font-weight="800" fill="#64748B" letter-spacing="0.16em">PULSE COACH · YOUR ALERTS</text>
      <text x="0" y="30" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0F172A">Watching 87 accounts</text>
      <text x="0" y="52" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#64748B">Carrier pivots · Volume swings · New lanes</text>
    </g>

    <!-- Alert card 1: Carrier pivot -->
    <g transform="translate(20,120)">
      <rect width="510" height="118" rx="10" fill="#F0FDFA" stroke="#10B981" stroke-width="1.5"/>
      <g transform="translate(14,14)">
        <rect width="98" height="18" rx="3" fill="#10B981"/>
        <text x="49" y="13" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="9" font-weight="800" fill="#FFFFFF" letter-spacing="0.1em">CARRIER PIVOT</text>
      </g>
      <text x="124" y="27" font-family="ui-monospace, SF Mono, monospace" font-size="10" font-weight="600" fill="#64748B">2h ago</text>
      <text x="14" y="60" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Samsung Electronics</text>
      <text x="14" y="80" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="500" fill="#334155">Top-3 carrier mix shifted 31% in last 60 days. Hapag-Lloyd up, ONE down.</text>
      <g transform="translate(14,92)">
        <rect width="112" height="22" rx="6" fill="#10B981"/>
        <text x="56" y="15" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Draft outreach →</text>
      </g>
    </g>

    <!-- Alert card 2: Volume +32% -->
    <g transform="translate(20,250)">
      <rect width="510" height="118" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
      <g transform="translate(14,14)">
        <rect width="98" height="18" rx="3" fill="#3B82F6"/>
        <text x="49" y="13" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="9" font-weight="800" fill="#FFFFFF" letter-spacing="0.1em">VOLUME +32% MoM</text>
      </g>
      <text x="124" y="27" font-family="ui-monospace, SF Mono, monospace" font-size="10" font-weight="600" fill="#64748B">6h ago</text>
      <text x="14" y="60" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Costco Wholesale</text>
      <text x="14" y="80" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="500" fill="#334155">Trans-Pacific volume jumped 32% MoM. New origin lane: VN→USWC activated Mar 8.</text>
      <g transform="translate(14,92)">
        <rect width="112" height="22" rx="6" fill="#3B82F6"/>
        <text x="56" y="15" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Draft outreach →</text>
      </g>
    </g>

    <!-- Alert card 3: New lane -->
    <g transform="translate(20,380)">
      <rect width="510" height="118" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
      <g transform="translate(14,14)">
        <rect width="74" height="18" rx="3" fill="#F59E0B"/>
        <text x="37" y="13" text-anchor="middle" font-family="ui-monospace, SF Mono, monospace" font-size="9" font-weight="800" fill="#FFFFFF" letter-spacing="0.1em">NEW LANE</text>
      </g>
      <text x="100" y="27" font-family="ui-monospace, SF Mono, monospace" font-size="10" font-weight="600" fill="#64748B">yesterday</text>
      <text x="14" y="60" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Walmart Inc.</text>
      <text x="14" y="80" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="500" fill="#334155">First MX→USGC entry in 18 months. Nearshoring activation signal.</text>
      <g transform="translate(14,92)">
        <rect width="112" height="22" rx="6" fill="#F59E0B"/>
        <text x="56" y="15" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Draft outreach →</text>
      </g>
    </g>

    <!-- Footer -->
    <g transform="translate(20,520)">
      <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">Threshold tuned to filter routine variance — under 20% MoM never alerts</text>
    </g>
  </g>
</svg>
