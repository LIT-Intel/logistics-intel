<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="26,787 active US importers tracked by LIT — top industries by TEU">
  <defs>
    <linearGradient id="i-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="i-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFCFE"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="i-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>
    <radialGradient id="i-glow" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="i-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#i-bg)"/>
  <circle cx="900" cy="360" r="420" fill="url(#i-glow)"/>

  <!-- Top-left brand badge -->
  <g transform="translate(40,32)">
    <rect width="148" height="28" rx="14" fill="rgba(0,240,255,0.14)" stroke="#00F0FF" stroke-width="1"/>
    <circle cx="20" cy="14" r="4" fill="#00F0FF"/>
    <text x="36" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#E0F2FE" letter-spacing="0.16em">LIT IMPORTER COHORT</text>
  </g>

  <!-- Left: title block -->
  <g transform="translate(40,160)">
    <text font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="#F8FAFC" letter-spacing="-0.024em">26,787</text>
    <text x="0" y="48" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#00F0FF" letter-spacing="-0.018em">active US importers</text>
    <text x="0" y="98" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#94A3B8">
      <tspan x="0" dy="0">61 industries · $59.3B declared value</tspan>
      <tspan x="0" dy="26">722,722 TEU · 253,500 shipments</tspan>
      <tspan x="0" dy="26">Live from US Customs Bill of Lading filings</tspan>
    </text>
    <g transform="translate(0,228)">
      <rect width="200" height="32" rx="16" fill="rgba(0,240,255,0.10)" stroke="#00F0FF" stroke-width="1"/>
      <text x="100" y="20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#E0F2FE" letter-spacing="0.14em">3,508 SUBSTANTIVE</text>
    </g>
  </g>

  <!-- Right: bar chart panel with top 5 industries -->
  <g transform="translate(610,80)" filter="url(#i-shadow)">
    <rect width="550" height="560" rx="14" fill="url(#i-card)"/>
    <g transform="translate(20,20)">
      <text font-family="ui-monospace, SF Mono, monospace" font-size="10" font-weight="800" fill="#64748B" letter-spacing="0.16em">TOP INDUSTRIES BY TRAILING TEU</text>
      <text x="0" y="30" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0F172A">Where the freight actually sits</text>
      <text x="0" y="52" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#64748B">Live aggregates from lit_company_directory</text>
    </g>

    <!-- Bars -->
    <g transform="translate(40,130)" font-family="Inter, system-ui, sans-serif">
      <!-- Food and Staples Retailing -->
      <g>
        <text x="0" y="14" font-size="12" font-weight="700" fill="#0F172A">Food &amp; Staples Retailing</text>
        <text x="470" y="14" text-anchor="end" font-family="ui-monospace, SF Mono, monospace" font-size="11" font-weight="700" fill="#0369A1">172 imp · 2,800 TEU</text>
        <rect x="0" y="22" width="470" height="14" rx="4" fill="url(#i-bar)"/>
      </g>
      <!-- Distributors -->
      <g transform="translate(0,58)">
        <text x="0" y="14" font-size="12" font-weight="700" fill="#0F172A">Distributors</text>
        <text x="470" y="14" text-anchor="end" font-family="ui-monospace, SF Mono, monospace" font-size="11" font-weight="700" fill="#0369A1">151 imp · 2,602 TEU</text>
        <rect x="0" y="22" width="437" height="14" rx="4" fill="url(#i-bar)"/>
      </g>
      <!-- Trading Companies -->
      <g transform="translate(0,116)">
        <text x="0" y="14" font-size="12" font-weight="700" fill="#0F172A">Trading Companies &amp; Distributors</text>
        <text x="470" y="14" text-anchor="end" font-family="ui-monospace, SF Mono, monospace" font-size="11" font-weight="700" fill="#0369A1">314 imp · 1,138 TEU</text>
        <rect x="0" y="22" width="191" height="14" rx="4" fill="url(#i-bar)"/>
      </g>
      <!-- Automobiles -->
      <g transform="translate(0,174)">
        <text x="0" y="14" font-size="12" font-weight="700" fill="#0F172A">Automobiles</text>
        <text x="470" y="14" text-anchor="end" font-family="ui-monospace, SF Mono, monospace" font-size="11" font-weight="700" fill="#F59E0B">14 imp · 1,087 TEU · $581M ⚡</text>
        <rect x="0" y="22" width="183" height="14" rx="4" fill="url(#i-bar)"/>
      </g>
      <!-- Machinery -->
      <g transform="translate(0,232)">
        <text x="0" y="14" font-size="12" font-weight="700" fill="#0F172A">Machinery</text>
        <text x="470" y="14" text-anchor="end" font-family="ui-monospace, SF Mono, monospace" font-size="11" font-weight="700" fill="#0369A1">216 imp · 951 TEU</text>
        <rect x="0" y="22" width="160" height="14" rx="4" fill="url(#i-bar)"/>
      </g>
      <!-- Food Products -->
      <g transform="translate(0,290)">
        <text x="0" y="14" font-size="12" font-weight="700" fill="#0F172A">Food Products</text>
        <text x="470" y="14" text-anchor="end" font-family="ui-monospace, SF Mono, monospace" font-size="11" font-weight="700" fill="#0369A1">221 imp · 751 TEU</text>
        <rect x="0" y="22" width="126" height="14" rx="4" fill="url(#i-bar)"/>
      </g>
      <!-- Specialty Retail -->
      <g transform="translate(0,348)">
        <text x="0" y="14" font-size="12" font-weight="700" fill="#0F172A">Specialty Retail</text>
        <text x="470" y="14" text-anchor="end" font-family="ui-monospace, SF Mono, monospace" font-size="11" font-weight="700" fill="#0369A1">127 imp · 681 TEU</text>
        <rect x="0" y="22" width="114" height="14" rx="4" fill="url(#i-bar)"/>
      </g>
    </g>

    <!-- Footer callout -->
    <g transform="translate(20,540)">
      <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">⚡ Automobiles: smallest cohort by importer count, 4th-largest by TEU, 1st by declared value</text>
    </g>
  </g>
</svg>
