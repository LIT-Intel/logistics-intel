<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="LIT workflow: Search shippers, Trade picture, Identify contacts, Launch outreach, CRM handoff">
  <defs>
    <linearGradient id="wf-bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="wf-accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="wf-hero" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="wf-step" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#wf-bg)"/>
  <rect x="40" y="40" width="1120" height="640" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Header strip -->
  <rect x="40" y="40" width="1120" height="110" rx="20" fill="url(#wf-hero)"/>
  <rect x="40" y="130" width="1120" height="20" fill="#1E293B"/>

  <!-- Header icon + title -->
  <rect x="72" y="66" width="44" height="44" rx="10" fill="#2563EB"/>
  <text x="94" y="96" text-anchor="middle" fill="#FFFFFF" font-family="Arial,sans-serif" font-weight="700" font-size="22">→</text>
  <text x="132" y="88" fill="#FFFFFF" font-family="Georgia,serif" font-weight="700" font-size="20">LIT Workflow · From Shipment Signal to Booked Freight</text>
  <text x="132" y="112" fill="#94A3B8" font-family="Arial,sans-serif" font-size="13">Five steps that replace scattered tools with one freight-specific sales workflow</text>

  <!-- Step cards row — 5 cards across -->
  <!-- Step 1: Search -->
  <rect x="60" y="190" width="200" height="210" rx="14" fill="url(#wf-step)" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="110" cy="230" r="22" fill="#2563EB"/>
  <text x="110" y="238" text-anchor="middle" fill="#FFFFFF" font-family="Arial,sans-serif" font-weight="700" font-size="18">1</text>
  <text x="160" y="235" fill="#1D4ED8" font-family="Arial,sans-serif" font-weight="700" font-size="13">Search</text>
  <text x="80" y="272" fill="#0F172A" font-family="Arial,sans-serif" font-weight="700" font-size="12.5">Find active shippers</text>
  <text x="80" y="293" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">Filter by lane,</text>
  <text x="80" y="311" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">commodity, origin,</text>
  <text x="80" y="329" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">destination, or</text>
  <text x="80" y="347" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">shipment activity.</text>
  <text x="80" y="376" fill="#2563EB" font-family="Arial,sans-serif" font-size="11" font-weight="700">BOL · PIERS · Trade data</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="295" x2="292" y2="295" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="292,291 302,295 292,299" fill="#94A3B8"/>

  <!-- Step 2: Trade Picture -->
  <rect x="300" y="190" width="200" height="210" rx="14" fill="url(#wf-step)" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="350" cy="230" r="22" fill="#2563EB"/>
  <text x="350" y="238" text-anchor="middle" fill="#FFFFFF" font-family="Arial,sans-serif" font-weight="700" font-size="18">2</text>
  <text x="388" y="235" fill="#1D4ED8" font-family="Arial,sans-serif" font-weight="700" font-size="13">Trade Picture</text>
  <text x="320" y="272" fill="#0F172A" font-family="Arial,sans-serif" font-weight="700" font-size="12.5">Understand the account</text>
  <text x="320" y="293" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">Volume, lanes, carrier</text>
  <text x="320" y="311" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">mix, cadence, and</text>
  <text x="320" y="329" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">recent changes in</text>
  <text x="320" y="347" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">freight behavior.</text>
  <text x="320" y="376" fill="#2563EB" font-family="Arial,sans-serif" font-size="11" font-weight="700">Pulse AI · Lane signals</text>

  <!-- Arrow 2→3 -->
  <line x1="500" y1="295" x2="532" y2="295" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="532,291 542,295 532,299" fill="#94A3B8"/>

  <!-- Step 3: Identify Contacts -->
  <rect x="540" y="190" width="200" height="210" rx="14" fill="url(#wf-step)" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="590" cy="230" r="22" fill="#2563EB"/>
  <text x="590" y="238" text-anchor="middle" fill="#FFFFFF" font-family="Arial,sans-serif" font-weight="700" font-size="18">3</text>
  <text x="622" y="235" fill="#1D4ED8" font-family="Arial,sans-serif" font-weight="700" font-size="13">Contacts</text>
  <text x="558" y="272" fill="#0F172A" font-family="Arial,sans-serif" font-weight="700" font-size="12.5">Find decision-makers</text>
  <text x="558" y="293" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">Identify logistics,</text>
  <text x="558" y="311" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">procurement, and</text>
  <text x="558" y="329" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">supply chain contacts</text>
  <text x="558" y="347" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">at the account.</text>
  <text x="558" y="376" fill="#2563EB" font-family="Arial,sans-serif" font-size="11" font-weight="700">Contact Discovery · Enrich</text>

  <!-- Arrow 3→4 -->
  <line x1="740" y1="295" x2="772" y2="295" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="772,291 782,295 772,299" fill="#94A3B8"/>

  <!-- Step 4: Launch Outreach -->
  <rect x="780" y="190" width="200" height="210" rx="14" fill="url(#wf-step)" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="830" cy="230" r="22" fill="#2563EB"/>
  <text x="830" y="238" text-anchor="middle" fill="#FFFFFF" font-family="Arial,sans-serif" font-weight="700" font-size="18">4</text>
  <text x="862" y="235" fill="#1D4ED8" font-family="Arial,sans-serif" font-weight="700" font-size="13">Outreach</text>
  <text x="798" y="272" fill="#0F172A" font-family="Arial,sans-serif" font-weight="700" font-size="12.5">Send with context</text>
  <text x="798" y="293" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">Email, LinkedIn, and</text>
  <text x="798" y="311" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">call sequences tied</text>
  <text x="798" y="329" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">to real supply chain</text>
  <text x="798" y="347" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">context and signals.</text>
  <text x="798" y="376" fill="#2563EB" font-family="Arial,sans-serif" font-size="11" font-weight="700">Campaign Builder · Sequences</text>

  <!-- Arrow 4→5 -->
  <line x1="980" y1="295" x2="1012" y2="295" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="1012,291 1022,295 1012,299" fill="#94A3B8"/>

  <!-- Step 5: CRM Handoff -->
  <rect x="1020" y="190" width="200" height="210" rx="14" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <circle cx="1070" cy="230" r="22" fill="#10B981"/>
  <text x="1070" y="238" text-anchor="middle" fill="#FFFFFF" font-family="Arial,sans-serif" font-weight="700" font-size="18">5</text>
  <text x="1102" y="235" fill="#059669" font-family="Arial,sans-serif" font-weight="700" font-size="13">CRM Handoff</text>
  <text x="1038" y="272" fill="#0F172A" font-family="Arial,sans-serif" font-weight="700" font-size="12.5">Push to your workflow</text>
  <text x="1038" y="293" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">Move qualified accounts</text>
  <text x="1038" y="311" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">into your CRM or sales</text>
  <text x="1038" y="329" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">process with context</text>
  <text x="1038" y="347" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">already attached.</text>
  <text x="1038" y="376" fill="#059669" font-family="Arial,sans-serif" font-size="11" font-weight="700">Saved accounts · Export</text>

  <!-- Bottom summary bar -->
  <rect x="60" y="430" width="1080" height="80" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="600" y="462" text-anchor="middle" fill="#0F172A" font-family="Arial,sans-serif" font-weight="700" font-size="13">One workspace replaces: trade data tools + contact databases + LinkedIn research + spreadsheets + CRM</text>
  <text x="600" y="488" text-anchor="middle" fill="#475569" font-family="Arial,sans-serif" font-size="12">The goal is better account selection and better sales timing — not more data for reps to sort through.</text>

  <!-- Sample account card -->
  <rect x="60" y="535" width="500" height="120" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="80" y="563" fill="#64748B" font-family="Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="0.5">SAMPLE ACCOUNT · STEP 2 OUTPUT</text>
  <text x="80" y="585" fill="#0F172A" font-family="Arial,sans-serif" font-weight="700" font-size="13">NorthBay Furniture · Vietnam → Savannah</text>
  <text x="80" y="607" fill="#475569" font-family="Arial,sans-serif" font-size="11.5">18 BOLs in 90 days · CMA + ONE · 22% volume increase MoM</text>
  <text x="80" y="628" fill="#2563EB" font-family="Arial,sans-serif" font-size="11" font-weight="700">→ 4 relevant contacts found · outreach launched via Step 4</text>

  <!-- Right summary block -->
  <rect x="580" y="535" width="560" height="120" rx="12" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="600" y="563" fill="#1D4ED8" font-family="Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="0.5">WHY THIS WORKFLOW MATTERS</text>
  <text x="600" y="586" fill="#0F172A" font-family="Arial,sans-serif" font-size="12">Timing determines whether a shipper conversation turns into</text>
  <text x="600" y="604" fill="#0F172A" font-family="Arial,sans-serif" font-size="12">a quote, a trial lane, or nothing. This workflow surfaces the</text>
  <text x="600" y="622" fill="#0F172A" font-family="Arial,sans-serif" font-size="12">right accounts at the right moment — with a reason to reach out.</text>
  <text x="600" y="644" fill="#1D4ED8" font-family="Arial,sans-serif" font-size="11" font-weight="700">logisticintel.com</text>

  <!-- Footer brand badge -->
  <rect x="60" y="672" width="200" height="30" rx="8" fill="url(#wf-accent)"/>
  <text x="160" y="692" text-anchor="middle" fill="#FFFFFF" font-family="Georgia,serif" font-size="13" font-weight="700">LIT · Workflow Overview</text>
</svg>
