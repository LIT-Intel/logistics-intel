<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 56" width="400" height="56" role="img" aria-labelledby="title desc">
  <title id="title">Logistic Intel lockup</title>
  <desc id="desc">Logistic Intel logomark and wordmark horizontal lockup for use on light backgrounds.</desc>
  <!-- Font: Space Grotesk. Falls back to system sans-serif. -->
  <defs>
    <radialGradient id="lockup-light-glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#00F0FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lockup-light-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162033"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="lockup-light-intel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <style>
      .lit-lockup { font-family: "Space Grotesk", "SpaceGrotesk", system-ui, -apple-system, "Segoe UI", sans-serif; font-weight: 700; letter-spacing: -0.02em; font-size: 32px; }
      .lit-lockup-bold { font-weight: 800; }
    </style>
  </defs>
  <!-- Icon: rounded square with cyan glow + white L+I glyph (mirrors /lit-icon-glow.svg) -->
  <g transform="translate(4 4)">
    <rect x="0" y="0" width="48" height="48" rx="10.5" ry="10.5" fill="url(#lockup-light-surface)"/>
    <rect x="0" y="0" width="48" height="48" rx="10.5" ry="10.5" fill="url(#lockup-light-glow)"/>
    <path d="M15.75 12 V31.5 H33 V27.3 H20.4 V12 Z" fill="#FFFFFF"/>
    <rect x="0.75" y="0.75" width="46.5" height="46.5" rx="9.75" ry="9.75" fill="none" stroke="#00F0FF" stroke-opacity="0.18"/>
  </g>
  <!-- Wordmark, optically aligned -->
  <text x="66" y="38" class="lit-lockup" fill="#0F172A">Logistic <tspan class="lit-lockup-bold" fill="url(#lockup-light-intel)">Intel</tspan></text>
</svg>
