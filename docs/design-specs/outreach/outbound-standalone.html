<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LIT — Outbound Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'DM Sans', system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
  button { font-family: inherit; }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#020617">
  <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#020617"/>
    <path d="M14 14v36h20" stroke="#00F0FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M30 14h22" stroke="#00F0FF" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M30 28h9" stroke="#00F0FF" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M44 28v22" stroke="#00F0FF" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M30 50h14" stroke="#00F0FF" stroke-width="6" stroke-linecap="round" fill="none"/>
  </svg>
</template>

<div id="root"></div>

<script type="text/babel" src="Sidebar.jsx?v=2"></script>
<script type="text/babel" src="OutboundEngine.jsx?v=3"></script>

<script type="text/babel">
function App() {
  React.useEffect(() => {
    const run = () => window.lucide && window.lucide.createIcons();
    run();
    const t1 = setTimeout(run, 100);
    const t2 = setTimeout(run, 400);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  });
  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#020617'}}>
      <Sidebar active="outbound" onNav={()=>{}} />
      <main style={{flex:1,display:'flex',overflow:'hidden',position:'relative'}}>
        <OutboundEngine />
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
