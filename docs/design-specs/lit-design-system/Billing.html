<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LIT — Plan & Billing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background:#020617; color:#0F172A; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }

  /* Responsive */
  @media (max-width: 1100px) {
    .lit-billing-main { padding: 20px 20px 40px !important; }
    .lit-plan-grid { grid-template-columns: 1fr !important; }
    .lit-billing-hero-grid { grid-template-columns: 1fr !important; gap: 18px !important; }
  }
  @media (max-width: 820px) {
    .lit-billing-sidebar { display: none !important; }
    .lit-billing-header { padding: 14px 18px !important; }
    .lit-billing-main { padding: 16px 14px 32px !important; }
    .lit-billing-hero { padding: 20px !important; }
    .lit-billing-hero h1 { font-size: 30px !important; }
    .lit-invoice-row, .lit-invoice-head { grid-template-columns: 1fr auto auto !important; }
    .lit-invoice-hide-md { display: none !important; }
    .lit-payment-grid { grid-template-columns: 1fr !important; }
    .lit-enterprise-grid { grid-template-columns: 1fr !important; gap: 20px !important; }
    .lit-affiliate-grid { grid-template-columns: auto 1fr !important; }
    .lit-affiliate-grid > button { grid-column: 1 / -1; }
    .lit-tweaks-panel { width: calc(100vw - 32px) !important; right: 16px !important; bottom: 16px !important; }
  }
  /* mobile phone bezel */
  .lit-mobile-shell {
    background:#020617;
    border-radius: 28px;
    border: 1px solid #1e293b;
    padding: 8px;
    box-shadow: 0 30px 60px rgba(15,23,42,0.3);
    max-width: 420px;
    margin: 0 auto;
  }
  .lit-mobile-viewport {
    background:#F8FAFC;
    border-radius: 22px;
    overflow: hidden;
    height: 780px;
    overflow-y: auto;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="BillingShared.jsx"></script>
<script type="text/babel" src="BillingHero.jsx"></script>
<script type="text/babel" src="BillingPlans.jsx"></script>
<script type="text/babel" src="BillingUsageInvoices.jsx"></script>

<script type="text/babel">
'use strict';

/* ══ Tweakable defaults ══════════════════════════════ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "role": "admin",
  "state": "active",
  "plan": "pro",
  "cycle": "monthly",
  "usageData": true,
  "invoiceData": true,
  "paymentOnFile": true,
  "affiliate": "none",
  "viewport": "desktop"
}/*EDITMODE-END*/;

/* ══ State builder ══════════════════════════════════ */
function buildBillingState(tweaks) {
  const base = {
    plan: tweaks.plan,
    status: tweaks.state,
    billingOwner: 'Jordan Davis',
    amount: null,
    renewalDate: null,
    daysUntil: null,
    cycleLabel: null,
    seats: null,
    paymentMethod: tweaks.paymentOnFile ? {
      brand: 'Visa', last4: '4242', expiry: '08/28', country: 'US'
    } : null,
    billingEmail: 'billing@logisticintel.com',
    lastFailed: null,
    billingContact: null,
    usageNearLimit: null,
  };

  const plan = tweaks.plan;
  const cycle = tweaks.cycle;
  const seatCount = plan === 'free' ? 1 : plan === 'enterprise' ? 42 : 8;

  if (plan === 'pro') {
    const monthly = 49 * seatCount;
    base.amount = cycle === 'annual' ? `$${(41*seatCount*12).toLocaleString()}` : `$${monthly.toLocaleString()}`;
    base.cycleLabel = cycle === 'annual' ? 'Billed yearly' : 'Billed monthly';
    base.seats = { used: 5, total: seatCount };
  } else if (plan === 'free') {
    base.amount = '$0';
    base.cycleLabel = 'No charge';
  } else if (plan === 'enterprise') {
    base.amount = 'Contract';
    base.cycleLabel = 'Custom terms';
    base.seats = { used: 28, total: 42 };
    base.billingContact = 'Priya Narang, Account Exec';
  }

  switch (tweaks.state) {
    case 'free':
      base.plan = 'free';
      base.amount = '$0'; base.cycleLabel = 'No charge';
      base.renewalDate = '—'; base.daysUntil = null;
      break;
    case 'trial':
      base.plan = 'pro';
      base.renewalDate = 'May 7, 2026';
      base.daysUntil = '14 days left';
      base.amount = 'Free until May 7'; base.cycleLabel = 'Trial';
      base.paymentMethod = null;
      break;
    case 'active':
      base.renewalDate = 'May 18, 2026';
      base.daysUntil = 'in 25 days';
      break;
    case 'pastdue':
      base.renewalDate = 'Apr 28, 2026';
      base.daysUntil = 'suspends in 5 days';
      base.lastFailed = 'Apr 18, 2026';
      break;
    case 'canceled':
      base.renewalDate = 'May 18, 2026';
      base.daysUntil = 'access ends in 25 days';
      break;
    case 'enterprise':
      base.plan = 'enterprise';
      base.renewalDate = 'Dec 31, 2026';
      base.daysUntil = 'renews annually';
      base.amount = 'Contract'; base.cycleLabel = 'Custom terms';
      base.paymentMethod = null;
      base.billingContact = 'Priya Narang, Account Exec';
      break;
  }

  // Usage
  const usageFull = plan === 'free'
    ? [
        { label:'Company searches',   used: 64,  limit: 100,     icon:'search',      resetDate:'May 1' },
        { label:'Pulse queries',      used: 17,  limit: 20,      icon:'activity',    resetDate:'May 1' },
        { label:'Saved companies',    used: 22,  limit: 50,      icon:'bookmark',    resetDate:null },
        { label:'Contact enrichment', used: 0,   limit: 0,       icon:'user-check',  resetDate:null },
        { label:'Campaign sends',     used: 0,   limit: 0,       icon:'send',        resetDate:null },
        { label:'Exports & reports',  used: 0,   limit: 0,       icon:'file-down',   resetDate:null },
        { label:'Team seats',         used: 1,   limit: 1,       icon:'users',       resetDate:null },
      ]
    : plan === 'enterprise'
    ? [
        { label:'Company searches',   used: 14820, limit: Infinity, icon:'search',     resetDate:null },
        { label:'Pulse queries',      used: 6240,  limit: Infinity, icon:'activity',   resetDate:null },
        { label:'Saved companies',    used: 2881,  limit: Infinity, icon:'bookmark',   resetDate:null },
        { label:'Contact enrichment', used: 9420,  limit: 20000,    icon:'user-check', resetDate:'May 18' },
        { label:'Campaign sends',     used: 62400, limit: 250000,   icon:'send',       resetDate:'May 1' },
        { label:'Exports & reports',  used: 214,   limit: Infinity, icon:'file-down',  resetDate:null },
        { label:'Team seats',         used: 28,    limit: 42,       icon:'users',      resetDate:null },
      ]
    : [
        { label:'Company searches',   used: 4820, limit: Infinity, icon:'search',     resetDate:null },
        { label:'Pulse queries',      used: 1720, limit: 2000,     icon:'activity',   resetDate:'May 1' },
        { label:'Saved companies',    used: 312,  limit: Infinity, icon:'bookmark',   resetDate:null },
        { label:'Contact enrichment', used: 340,  limit: 500,      icon:'user-check', resetDate:'May 18' },
        { label:'Campaign sends',     used: 8240, limit: 10000,    icon:'send',       resetDate:'May 1' },
        { label:'Exports & reports',  used: 48,   limit: Infinity, icon:'file-down',  resetDate:null },
        { label:'Team seats',         used: 5,    limit: 10,       icon:'users',      resetDate:null },
      ];
  base.usage = usageFull;

  // surface the nearest-to-limit meter for banner
  const capped = usageFull.filter(u => u.limit !== Infinity && u.limit > 0);
  const worst = capped.map(u => ({...u, pct: Math.round((u.used/u.limit)*100)})).sort((a,b)=>b.pct-a.pct)[0];
  if (worst && worst.pct >= 80) base.usageNearLimit = worst;

  // Invoices
  const invoicesReal = [
    { id:'INV-20260401', number:'INV-20260401', date:'Apr 1, 2026', amount: 392.00, status:'paid',     description:'Pro plan · 8 seats · Apr 2026' },
    { id:'INV-20260301', number:'INV-20260301', date:'Mar 1, 2026', amount: 392.00, status:'paid',     description:'Pro plan · 8 seats · Mar 2026' },
    { id:'INV-20260201', number:'INV-20260201', date:'Feb 1, 2026', amount: 343.00, status:'paid',     description:'Pro plan · 7 seats · Feb 2026' },
    { id:'INV-20260101', number:'INV-20260101', date:'Jan 1, 2026', amount: 294.00, status:'refunded', description:'Pro plan · 6 seats · prorated refund' },
    { id:'INV-20251201', number:'INV-20251201', date:'Dec 1, 2025', amount: 294.00, status:'paid',     description:'Pro plan · 6 seats · Dec 2025' },
  ];
  const pastDueInvoices = [
    { id:'INV-20260501', number:'INV-20260501', date:'Apr 18, 2026', amount: 392.00, status:'failed', description:'Retry scheduled Apr 25, 2026' },
    ...invoicesReal,
  ];
  base.invoices = tweaks.state === 'pastdue' ? pastDueInvoices : invoicesReal;

  return base;
}

/* ══ Permissions ══════════════════════════════════════ */
function permissionsFor(role, state) {
  const isAdmin = role==='owner' || role==='admin' || role==='super';
  return {
    canView: true,
    canManage: isAdmin && state.status !== 'enterprise',   // enterprise bills by contract
    canSeeAffiliate: true,
    readOnly: !isAdmin,
  };
}

/* ══ Billing Page ══════════════════════════════════════ */
function BillingPage() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);
  const [cycle, setCycle] = React.useState(tweaks.cycle);
  const [modal, setModal] = React.useState(null); // 'checkout' | 'portal' | 'contact'
  const [choosingPlan, setChoosingPlan] = React.useState(null);

  const state = React.useMemo(()=>buildBillingState({...tweaks, cycle}), [tweaks, cycle]);
  const perms = permissionsFor(tweaks.role, state);

  // Edit-mode handshake
  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  const setTweak = (k,v) => {
    setTweaks(t => ({...t, [k]:v}));
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*');
  };

  const onUpgrade = (planId) => { setChoosingPlan(planId || 'pro'); setModal('checkout'); };
  const onPortal  = () => setModal('portal');
  const onContact = () => setModal('contact');

  const content = (
    <>
      {/* READ-ONLY unauthorized ribbon */}
      {perms.readOnly && (
        <div style={{background:'linear-gradient(90deg,#EFF6FF,#F5F9FF)',border:'1px solid #BFDBFE',borderRadius:12,padding:'12px 16px',display:'flex',alignItems:'center',gap:12,marginBottom:16,flexWrap:'wrap'}}>
          <div style={{width:32,height:32,borderRadius:9,background:'#DBEAFE',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <i data-lucide="eye" style={{width:14,height:14,color:'#2563EB'}}></i>
          </div>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontFamily:'Space Grotesk,sans-serif',fontSize:13,fontWeight:700,color:'#0F172A'}}>Read-only view</div>
            <div style={{fontFamily:'DM Sans,sans-serif',fontSize:12.5,color:'#475569',marginTop:2}}>You can see your workspace's plan and usage, but only admins can change billing. Contact your admin to make changes.</div>
          </div>
          <button style={bBtnGhost}><i data-lucide="send" style={{width:12,height:12}}></i> Contact admin</button>
        </div>
      )}

      <BillingAlerts state={state} onUpgrade={()=>onUpgrade()} onPortal={onPortal} onContact={onContact} canManage={perms.canManage}/>
      <div style={{height:16}}/>

      <BillingHero
        state={state}
        cycle={cycle}
        setCycle={(c)=>{setCycle(c); setTweak('cycle',c);}}
        onUpgrade={()=>onUpgrade()}
        onPortal={onPortal}
        onContact={onContact}
        canManage={perms.canManage}
      />

      <div style={{height:28}}/>
      <BillingUsage usage={state.usage} hasData={tweaks.usageData} onUpgrade={()=>onUpgrade()} canManage={perms.canManage}/>

      <div style={{height:28}}/>
      <BillingPlans currentPlan={state.plan} cycle={cycle} canManage={perms.canManage} onChoose={onUpgrade} onContact={onContact}/>

      <div style={{height:28}}/>
      <div className="lit-payment-grid" style={{display:'grid',gridTemplateColumns:'1.1fr 1fr',gap:20,alignItems:'stretch'}}>
        <div style={{display:'flex',flexDirection:'column'}}>
          <BSectionTitle overline="Payment" title="Payment method" subtitle="Stripe manages storage, retries, tax, and receipts. We never touch raw card data."/>
          <PaymentMethodCard pm={state.paymentMethod} email={state.billingEmail} onPortal={onPortal} canManage={perms.canManage} status={state.status}/>
        </div>
        <div style={{display:'flex',flexDirection:'column'}}>
          <BSectionTitle overline="Enterprise" title="Need something bigger?" subtitle="Custom seat pools, SSO, pooled credits, and a dedicated CSM for revenue-critical teams."/>
          <EnterpriseCard onContact={onContact}/>
        </div>
      </div>

      <div style={{height:28}}/>
      <BillingInvoices invoices={state.invoices} hasData={tweaks.invoiceData} onPortal={onPortal} canManage={perms.canManage}/>

      <div style={{height:28}}/>
      <BSectionTitle overline="Partners" title="LIT Partner program" subtitle="Earn recurring credits or commission by referring freight teams."/>
      <AffiliateTieIn affiliateRole={tweaks.affiliate}
        onApply={()=>window.open('#','_blank')}
        onDashboard={()=>window.open('#','_blank')}
        onAdmin={()=>window.open('#','_blank')}/>

      <div style={{height:28}}/>
      <TrustFooter/>

      <div style={{height:32}}/>
      <HandoffNotes/>
    </>
  );

  /* Mobile viewport wrapper */
  if (tweaks.viewport === 'mobile') {
    return (
      <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#020617',alignItems:'center',justifyContent:'center',padding:24}}>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
          <div style={{fontFamily:'Space Grotesk,sans-serif',fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'0.14em',textTransform:'uppercase'}}>Mobile preview · 420px</div>
          <div className="lit-mobile-shell">
            <div className="lit-mobile-viewport">
              <MobileBillingHeader state={state} role={tweaks.role}/>
              <div style={{padding:'14px 14px 40px'}}>
                {content}
              </div>
            </div>
          </div>
        </div>
        <TweaksPanel show={showTweaks} tweaks={tweaks} setTweak={setTweak}/>
        <StripeHandoffModal action={modal} onClose={()=>setModal(null)} onConfirm={()=>setModal(null)} plan={choosingPlan} cycle={cycle}/>
      </div>
    );
  }

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#020617'}}>
      <div className="lit-billing-sidebar"><Sidebar active="settings" onNav={()=>{}}/></div>
      <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'#F4F6FB',minWidth:0}}>
        <BillingHeader role={tweaks.role} state={state}/>
        <div className="lit-billing-main" style={{flex:1,overflowY:'auto',padding:'24px 36px 48px',position:'relative'}}>
          <div style={{maxWidth:1180,margin:'0 auto'}}>
            {content}
          </div>
        </div>
      </main>
      <TweaksPanel show={showTweaks} tweaks={tweaks} setTweak={setTweak}/>
      <StripeHandoffModal action={modal} onClose={()=>setModal(null)} onConfirm={()=>setModal(null)} plan={choosingPlan} cycle={cycle}/>
    </div>
  );
}

/* ══ Header ══════════════════════════════════════════ */
function BillingHeader({ role, state }) {
  const roleLabel = {owner:'Owner',admin:'Admin',manager:'Manager',member:'Member',viewer:'Viewer',super:'Superadmin'}[role] || role;
  return (
    <div className="lit-billing-header" style={{padding:'20px 36px 18px',borderBottom:'1px solid #E5E7EB',background:'#FFFFFF',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between',gap:16,flexWrap:'wrap'}}>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:7,fontFamily:'DM Sans,sans-serif',fontSize:12,color:'#94a3b8'}}>
            <span>Settings</span>
            <i data-lucide="chevron-right" style={{width:11,height:11}}></i>
            <span style={{color:'#475569',fontWeight:500}}>Plan & billing</span>
          </div>
          <div style={{fontFamily:'Space Grotesk,sans-serif',fontSize:22,fontWeight:700,color:'#0F172A',letterSpacing:'-0.02em',marginTop:2}}>Plan & billing</div>
        </div>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <BBadge tone="blue" icon="user-cog">{roleLabel}</BBadge>
        <StatusPill status={state.status}/>
      </div>
    </div>
  );
}

function MobileBillingHeader({ state, role }) {
  return (
    <div style={{position:'sticky',top:0,background:'rgba(255,255,255,0.95)',backdropFilter:'blur(8px)',borderBottom:'1px solid #E5E7EB',padding:'14px 16px',display:'flex',alignItems:'center',gap:10,zIndex:10}}>
      <button style={{background:'transparent',border:'none',padding:4,cursor:'pointer'}}><i data-lucide="chevron-left" style={{width:18,height:18,color:'#0F172A'}}></i></button>
      <div style={{flex:1}}>
        <div style={{fontFamily:'Space Grotesk,sans-serif',fontSize:15,fontWeight:700,color:'#0F172A',letterSpacing:'-0.01em'}}>Plan & billing</div>
      </div>
      <StatusPill status={state.status}/>
    </div>
  );
}

/* ══ Handoff Notes ══════════════════════════════════════ */
function HandoffNotes() {
  const notes = [
    { title:'Inspect the repo first', body:'Implementation should reuse the existing billing route + Stripe functions from logistics-intel. Don\u2019t assume filenames — confirm with a tree walk of settings/billing, stripe/* handlers, and the subscriptions table schema.' },
    { title:'No raw card UI', body:'LIT never renders PAN/CVV/expiry inputs. Upgrade and Payment method CTAs must open Stripe Checkout or Stripe Customer Portal (session URL fetched from a server endpoint). Stripe Embedded Checkout can ship later without redesign.' },
    { title:'Permission model', body:'`canManage` = owner | admin | superadmin AND state !== enterprise. Enterprise workspaces lock self-serve actions even for admins; CTAs route to account-exec contact flow instead. Regular users see read-only ribbon + "Contact admin".' },
    { title:'Pricing is backend-configured', body:'Plan IDs (free/pro/enterprise) are stable. Dollar amounts, feature caps, and seat costs must be read from /config/plans (or Stripe Prices + product metadata). Do not hardcode the values in this mock — they are placeholders.' },
    { title:'Usage metering', body:'Seven meters read from a single `/billing/usage` endpoint returning { key, used, limit, reset_at }. Missing endpoint = show the "Usage data not available yet" empty state — never synthesize numbers.' },
    { title:'Invoices', body:'Render from Stripe `invoices.list` (cached workspace-side). Status enum maps to: paid, open, failed (past_due), refunded, void. All download/view actions link to Stripe hosted invoice URLs. Missing list = "Invoices managed in Stripe" empty state.' },
    { title:'State matrix', body:'Six canonical states (free, trial, active, pastdue, canceled, enterprise) drive hero copy, primary CTA, and which banners surface. Toggle in Tweaks to verify each.' },
    { title:'Webhook sync', body:'Stripe webhooks (invoice.paid, customer.subscription.updated, customer.subscription.deleted, invoice.payment_failed) update the workspace\u2019s billing row. UI should treat Stripe as source of truth; display "Synced X ago" timestamp.' },
    { title:'Affiliate tie-in', body:'Three-way split based on partner role: none → application CTA; affiliate → dashboard CTA; admin → partner admin CTA. Role comes from the existing partner table, not the billing role.' },
  ];
  return (
    <BCard style={{background:'linear-gradient(180deg,#0F172A 0%, #1e293b 100%)',color:'#E2E8F0',border:'1px solid #1e293b'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
        <div style={{width:32,height:32,borderRadius:8,background:'rgba(0,240,255,0.12)',border:'1px solid rgba(0,240,255,0.3)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <i data-lucide="code-2" style={{width:15,height:15,color:'#00F0FF'}}></i>
        </div>
        <div>
          <div style={{fontFamily:'Space Grotesk,sans-serif',fontSize:15,fontWeight:700,color:'#fff'}}>Handoff notes for Claude Code</div>
          <div style={{fontFamily:'DM Sans,sans-serif',fontSize:12,color:'#94a3b8',marginTop:2}}>Design intent → implementation contract. Read before wiring.</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {notes.map((n,i)=>(
          <div key={i} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:10,padding:'12px 14px'}}>
            <div style={{fontFamily:'Space Grotesk,sans-serif',fontSize:12,fontWeight:700,color:'#00F0FF',marginBottom:5}}>{i+1}. {n.title}</div>
            <div style={{fontFamily:'DM Sans,sans-serif',fontSize:12,color:'#cbd5e1',lineHeight:1.55}}>{n.body}</div>
          </div>
        ))}
      </div>
    </BCard>
  );
}

/* ══ Tweaks Panel ══════════════════════════════════════ */
function TweaksPanel({ show, tweaks, setTweak }) {
  if (!show) return null;
  return (
    <div className="lit-tweaks-panel" style={{position:'fixed',bottom:20,right:20,background:'#0F172A',border:'1px solid #1e293b',borderRadius:14,padding:16,width:280,boxShadow:'0 20px 60px rgba(0,0,0,0.5)',zIndex:400,color:'#fff'}}>
      <div style={{fontFamily:'Space Grotesk,sans-serif',fontSize:13,fontWeight:700,marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
        <i data-lucide="sliders" style={{width:13,height:13,color:'#60a5fa'}}></i> Tweaks
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:11}}>
        <TSelect label="Viewport" value={tweaks.viewport} onChange={v=>setTweak('viewport',v)} options={[['desktop','Desktop'],['mobile','Mobile']]}/>
        <TSelect label="View as role" value={tweaks.role} onChange={v=>setTweak('role',v)}
          options={[['owner','Owner'],['admin','Admin'],['manager','Manager'],['member','Member'],['viewer','Viewer'],['super','Superadmin']]}/>
        <TSelect label="Billing state" value={tweaks.state} onChange={v=>setTweak('state',v)}
          options={[['free','Free'],['trial','Trial'],['active','Active'],['pastdue','Past due'],['canceled','Canceled'],['enterprise','Enterprise']]}/>
        <TSelect label="Current plan" value={tweaks.plan} onChange={v=>setTweak('plan',v)}
          options={[['free','Free'],['pro','Pro'],['enterprise','Enterprise']]}/>
        <TSelect label="Affiliate role" value={tweaks.affiliate} onChange={v=>setTweak('affiliate',v)}
          options={[['none','Not enrolled'],['affiliate','Affiliate'],['admin','Program admin']]}/>
        <TToggle label="Usage data available" checked={tweaks.usageData} onChange={v=>setTweak('usageData',v)}/>
        <TToggle label="Invoice data available" checked={tweaks.invoiceData} onChange={v=>setTweak('invoiceData',v)}/>
        <TToggle label="Payment method on file" checked={tweaks.paymentOnFile} onChange={v=>setTweak('paymentOnFile',v)}/>
      </div>
    </div>
  );
}
function TSelect({ label, value, onChange, options }) {
  return (
    <div>
      <div style={{fontFamily:'Space Grotesk,sans-serif',fontSize:10,fontWeight:700,color:'#94a3b8',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:4}}>{label}</div>
      <select value={value} onChange={e=>onChange(e.target.value)} style={{width:'100%',background:'#020617',border:'1px solid #1e293b',borderRadius:7,padding:'7px 10px',color:'#E2E8F0',fontSize:12.5,fontFamily:'Space Grotesk,sans-serif',fontWeight:600,outline:'none',cursor:'pointer'}}>
        {options.map(([v,l])=><option key={v} value={v} style={{background:'#fff',color:'#0F172A'}}>{l}</option>)}
      </select>
    </div>
  );
}
function TToggle({ label, checked, onChange }) {
  return (
    <div onClick={()=>onChange(!checked)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,cursor:'pointer'}}>
      <span style={{fontFamily:'Space Grotesk,sans-serif',fontSize:12,fontWeight:600,color:'#cbd5e1'}}>{label}</span>
      <div style={{width:30,height:17,borderRadius:9,background:checked?'#3b82f6':'#334155',position:'relative',flexShrink:0,transition:'all 160ms'}}>
        <div style={{position:'absolute',top:2,left:checked?15:2,width:13,height:13,borderRadius:'50%',background:'#fff',transition:'all 160ms'}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BillingPage/>);
</script>
</body>
</html>
