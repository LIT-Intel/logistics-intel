<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LIT · Partner program — Design canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body,#root{height:100%;}
  body{font-family:'DM Sans',system-ui,sans-serif;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px;}
  button{font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="AffiliateLanding.jsx"></script>
<script type="text/babel" src="AffiliateApplication.jsx"></script>
<script type="text/babel" src="AffiliateDashboard.jsx"></script>
<script type="text/babel" src="StripeConnectFlow.jsx"></script>
<script type="text/babel" src="AffiliateAdmin.jsx"></script>

<script type="text/babel">
function App() {
  React.useEffect(() => {
    const run = () => window.lucide && window.lucide.createIcons();
    run();
    const t = [100, 400, 1000, 2500].map(ms => setTimeout(run, ms));
    return () => t.forEach(clearTimeout);
  });

  return (
    <DesignCanvas>
      <DCSection id="landing" title="1 · Public landing" subtitle="Marketing page linked from the main site footer.">
        <DCArtboard id="landing-main" label="Hero, how it works, tiers, FAQ" width={1280} height={2400}>
          <AffiliateLanding/>
        </DCArtboard>
        <DCPostIt top={-10} left={1320} rotate={-3} width={220}>
          Single CTA: "Apply to partner program". No pricing calculator until after approval (avoids gaming).
        </DCPostIt>
      </DCSection>

      <DCSection id="apply" title="2 · Application flow" subtitle="Logged-in user, not yet an affiliate.">
        <DCArtboard id="apply-form" label="A · Application form" width={720} height={900}>
          <AffiliateApplication state="form"/>
        </DCArtboard>
        <DCArtboard id="apply-pending" label="B · Submitted · pending review" width={720} height={900}>
          <AffiliateApplication state="pending"/>
        </DCArtboard>
        <DCArtboard id="apply-approved" label="C · Approved welcome" width={720} height={900}>
          <AffiliateApplication state="approved"/>
        </DCArtboard>
        <DCArtboard id="apply-rejected" label="D · Rejected" width={720} height={900}>
          <AffiliateApplication state="rejected"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="dashboard" title="3 · Partner dashboard" subtitle="Embedded in the main LIT app shell as the 'Partners' nav item.">
        <DCArtboard id="dash-overview" label="Overview · payouts enabled" width={1280} height={1100}>
          <AffiliateDashboard affiliateStatus="active" stripeStatus="payouts_enabled"/>
        </DCArtboard>
        <DCArtboard id="dash-needs-stripe" label="Overview · needs Stripe connection" width={1280} height={1100}>
          <AffiliateDashboard affiliateStatus="active" stripeStatus="not_connected"/>
        </DCArtboard>
        <DCArtboard id="dash-suspended" label="Read-only · suspended" width={1280} height={1100}>
          <AffiliateDashboard affiliateStatus="suspended" stripeStatus="payouts_enabled"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="stripe" title="4 · Stripe Connect handoff" subtitle="Modal states during Express onboarding.">
        <DCArtboard id="stripe-intro" label="A · Intro" width={720} height={720}>
          <div style={{position:'relative',height:'100%',background:'#F7F8FA'}}>
            <StripeConnectFlow step="intro"/>
          </div>
        </DCArtboard>
        <DCArtboard id="stripe-redir" label="B · Redirecting" width={720} height={720}>
          <div style={{position:'relative',height:'100%',background:'#F7F8FA'}}>
            <StripeConnectFlow step="redirecting"/>
          </div>
        </DCArtboard>
        <DCArtboard id="stripe-returned" label="C · Returned · verifying" width={720} height={720}>
          <div style={{position:'relative',height:'100%',background:'#F7F8FA'}}>
            <StripeConnectFlow step="returned"/>
          </div>
        </DCArtboard>
        <DCArtboard id="stripe-verified" label="D · Payouts enabled" width={720} height={720}>
          <div style={{position:'relative',height:'100%',background:'#F7F8FA'}}>
            <StripeConnectFlow step="verified"/>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="admin" title="5 · Internal admin" subtitle="Super-admin-only. Review queue, tiers, commission ledger, payout runs.">
        <DCArtboard id="admin-applications" label="Applications queue" width={1280} height={900}>
          <AffiliateAdmin/>
        </DCArtboard>
        <DCPostIt top={-10} left={1320} rotate={2} width={240}>
          Tier rates are snapshotted on each commission row at time of earn — editing a tier never retroactively changes cleared commissions.
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
